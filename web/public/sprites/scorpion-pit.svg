<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Sandy pit ground -->
  <ellipse cx="16" cy="24" rx="13" ry="7" fill="#c8a050"/>
  <!-- Pit depression (shadow) -->
  <ellipse cx="16" cy="25" rx="10" ry="5" fill="#9a7030"/>
  <!-- Rocky rim -->
  <ellipse cx="16" cy="22" rx="13" ry="5" fill="none" stroke="#8a6020" stroke-width="2.5"/>
  <polygon points="4,22 6,17 8,22" fill="#aa8040"/>
  <polygon points="10,19 12,15 14,19" fill="#aa8040"/>
  <polygon points="18,19 20,15 22,19" fill="#aa8040"/>
  <polygon points="24,22 26,17 28,22" fill="#aa8040"/>
  <!-- Scorpion body in pit -->
  <ellipse cx="16" cy="25" rx="4" ry="2.5" fill="#c8782a"/>
  <!-- Scorpion tail curling up -->
  <path d="M12,25 Q9,22 11,19 Q13,17 14,20" stroke="#b86020" stroke-width="2" fill="none"/>
  <!-- Tail tip / stinger -->
  <circle cx="14" cy="19.5" r="1.2" fill="#dd2200"/>
  <!-- Scorpion pincers -->
  <path d="M20,24 Q24,21 25,23" stroke="#b86020" stroke-width="1.8" fill="none"/>
  <path d="M20,26 Q24,27 25,25" stroke="#b86020" stroke-width="1.8" fill="none"/>
  <!-- Eyes -->
  <circle cx="20" cy="24.5" r="0.7" fill="#221100"/>
  <circle cx="20" cy="25.5" r="0.7" fill="#221100"/>
  <!-- Sand texture dots -->
  <circle cx="8" cy="27" r="0.5" fill="#b89040"/>
  <circle cx="23" cy="28" r="0.5" fill="#b89040"/>
  <circle cx="12" cy="29" r="0.5" fill="#b89040"/>
</svg>
