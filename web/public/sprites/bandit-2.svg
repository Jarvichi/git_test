<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Hood (raised 1px) -->
  <path d="M10,8 Q16,1 22,8" fill="#222233"/>
  <!-- Head -->
  <ellipse cx="16" cy="9" rx="5.5" ry="5" fill="#b87a50"/>
  <!-- Mask -->
  <rect x="10" y="10" width="12" height="5" rx="2" fill="#222233"/>
  <!-- Eyes -->
  <circle cx="13.5" cy="9" r="1" fill="#111"/>
  <circle cx="18.5" cy="9" r="1" fill="#111"/>
  <!-- Body -->
  <rect x="11" y="13" width="10" height="8" rx="1" fill="#334444"/>
  <!-- Belt with dagger -->
  <rect x="11" y="19" width="10" height="2" fill="#5a3a1a"/>
  <rect x="17" y="17" width="2" height="5" rx="0.5" fill="#aaaaaa"/>
  <!-- Arms: neutral mid-stride -->
  <rect x="6" y="14" width="5" height="3" rx="1" fill="#334444"/>
  <rect x="21" y="14" width="5" height="3" rx="1" fill="#334444"/>
  <!-- Legs: mid-stride spread -->
  <rect x="11" y="21" width="4" height="6" rx="1" fill="#223333"/>
  <rect x="17" y="21" width="4" height="6" rx="1" fill="#223333"/>
  <!-- Boots -->
  <rect x="10" y="25" width="6" height="3" rx="1" fill="#1a1a1a"/>
  <rect x="17" y="25" width="5" height="3" rx="1" fill="#1a1a1a"/>
</svg>
