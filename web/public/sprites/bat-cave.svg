  <path d="M20,5 Q21,3 22,5" stroke="#221133" stroke-width="1.5" fill="none"/>
  <circle cx="20" cy="6" r="1.2" fill="#221133"/>
  <path d="M26,12 Q25,10 24,12" stroke="#221133" stroke-width="1.5" fill="none"/>
  <path d="M26,12 Q27,10 28,12" stroke="#221133" stroke-width="1.5" fill="none"/>
