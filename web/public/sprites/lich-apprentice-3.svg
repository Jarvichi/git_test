<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Legs stride B - right back, left forward (opposite of frame 1) -->
  <ellipse cx="18" cy="27" rx="3" ry="4" fill="#2a2a3a" transform="rotate(10,18,27)"/>
  <ellipse cx="12" cy="26" rx="3" ry="4" fill="#2a2a3a" transform="rotate(-10,12,26)"/>
  <!-- Robe body -->
  <polygon points="10,14 9,30 23,30 22,14" fill="#2a2a3a"/>
  <line x1="16" y1="14" x2="16" y2="30" stroke="#1a1a2a" stroke-width="0.8"/>
  <!-- Robe trim - purple -->
  <line x1="9" y1="30" x2="23" y2="30" stroke="#6644aa" stroke-width="1"/>
  <line x1="10" y1="14" x2="9" y2="30" stroke="#6644aa" stroke-width="0.8"/>
  <line x1="22" y1="14" x2="23" y2="30" stroke="#6644aa" stroke-width="0.8"/>
  <!-- Head - young, gaunt -->
  <circle cx="16" cy="10" r="5" fill="#b8a0c0"/>
  <!-- Dark mage eyes -->
  <circle cx="13.5" cy="9.5" r="1.8" fill="#111"/>
  <circle cx="18.5" cy="9.5" r="1.8" fill="#111"/>
  <circle cx="13.5" cy="9" r="0.9" fill="#aa44ff"/>
  <circle cx="18.5" cy="9" r="0.9" fill="#aa44ff"/>
  <!-- Hood pulled back -->
  <path d="M11,7 Q16,4 21,7" stroke="#2a2a3a" stroke-width="2" fill="none"/>
  <!-- Grimoire - arm back -->
  <rect x="4" y="17" width="5" height="7" rx="0.5" fill="#3a2a1a"/>
  <rect x="5" y="18" width="3" height="5" rx="0.5" fill="#2a1a0a"/>
  <line x1="5" y1="20" x2="8" y2="20" stroke="#aa66ff" stroke-width="0.5"/>
  <line x1="5" y1="21" x2="8" y2="21" stroke="#aa66ff" stroke-width="0.5"/>
  <line x1="5" y1="22" x2="8" y2="22" stroke="#aa66ff" stroke-width="0.5"/>
  <!-- Staff - arm forward -->
  <line x1="23" y1="7" x2="21" y2="27" stroke="#6b4a2a" stroke-width="1.5"/>
  <circle cx="23" cy="7" r="2.5" fill="#221133"/>
  <circle cx="23" cy="7" r="1.5" fill="#7733cc"/>
  <circle cx="23" cy="7" r="0.7" fill="#cc88ff"/>
  <!-- Dark magic wisps -->
  <path d="M21,17 Q19,15 20,13" stroke="#7733cc" stroke-width="1" fill="none" opacity="0.7"/>
</svg>
