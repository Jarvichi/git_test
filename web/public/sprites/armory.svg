<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Building base -->
  <rect x="4" y="16" width="24" height="14" rx="1" fill="#777"/>
  <!-- Stone texture -->
  <line x1="4" y1="22" x2="28" y2="22" stroke="#555" stroke-width="0.8"/>
  <line x1="12" y1="16" x2="12" y2="30" stroke="#555" stroke-width="0.8"/>
  <line x1="20" y1="16" x2="20" y2="30" stroke="#555" stroke-width="0.8"/>
  <!-- Battlements on top -->
  <rect x="4" y="12" width="4" height="6" rx="0.5" fill="#888"/>
  <rect x="10" y="12" width="4" height="6" rx="0.5" fill="#888"/>
  <rect x="16" y="12" width="4" height="6" rx="0.5" fill="#888"/>
  <rect x="22" y="12" width="4" height="6" rx="0.5" fill="#888"/>
  <!-- Door -->
  <rect x="13" y="22" width="6" height="8" rx="1" fill="#444"/>
  <circle cx="18" cy="26" r="0.8" fill="#aaa"/>
  <!-- Weapon rack on wall -->
  <line x1="7" y1="18" x2="7" y2="22" stroke="#aaa" stroke-width="1.5"/>
  <rect x="6" y="17" width="3" height="1" rx="0.5" fill="#999"/>
  <line x1="23" y1="18" x2="23" y2="22" stroke="#aaa" stroke-width="1.5"/>
  <rect x="22" y="17" width="3" height="1" rx="0.5" fill="#999"/>
  <!-- Shield emblem on tower -->
  <rect x="15" y="14" width="4" height="5" rx="1" fill="#666"/>
  <line x1="17" y1="14" x2="17" y2="19" stroke="#888" stroke-width="0.8"/>
  <line x1="15" y1="16.5" x2="19" y2="16.5" stroke="#888" stroke-width="0.8"/>
</svg>
