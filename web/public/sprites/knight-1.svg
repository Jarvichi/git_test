<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Helmet (great helm) -->
  <rect x="10" y="2" width="12" height="12" rx="3" fill="#9999bb"/>
  <!-- Visor slit -->
  <rect x="11" y="8" width="10" height="2" rx="0.5" fill="#1a1a2a"/>
  <rect x="11" y="11" width="10" height="1.5" rx="0.5" fill="#1a1a2a"/>
  <!-- Helmet crest -->
  <rect x="14" y="1" width="4" height="4" rx="1" fill="#cc2222"/>
  <!-- Gorget / neck plate -->
  <rect x="12" y="13" width="8" height="3" rx="1" fill="#8888aa"/>
  <!-- Chest plate (pauldrons too) -->
  <rect x="8" y="15" width="16" height="11" rx="2" fill="#8888aa"/>
  <!-- Breastplate line -->
  <line x1="16" y1="15" x2="16" y2="26" stroke="#6666aa" stroke-width="1"/>
  <!-- Shield (left) -->
  <path d="M3,14 L3,25 Q3,28 6,28 L9,28 L9,14 Z" fill="#4444aa"/>
  <path d="M3,16 Q6,22 3,27" stroke="#8888cc" stroke-width="1" fill="none"/>
  <line x1="4" y1="21" x2="8" y2="21" stroke="#8888cc" stroke-width="0.8"/>
  <!-- Sword (right, raised) -->
  <rect x="23" y="4" width="2.5" height="20" rx="1" fill="#ddddee"/>
  <rect x="20" y="10" width="9" height="2.5" rx="1" fill="#aaaacc"/>
  <ellipse cx="24" cy="23" rx="2" ry="1.5" fill="#cc9922"/>
  <!-- Legs: left greave forward -->
  <rect x="9" y="24" width="5" height="7" rx="1" fill="#7777aa"/>
  <rect x="17" y="26" width="5" height="5" rx="1" fill="#7777aa"/>
  <!-- Sabatons: left forward -->
  <rect x="8" y="29" width="7" height="2.5" rx="1" fill="#6666aa"/>
  <rect x="16" y="29" width="6" height="2" rx="1" fill="#6666aa"/>
</svg>
