  <circle cx="14.5" cy="11" r="0.9" fill="#333"/>
  <circle cx="17.5" cy="11" r="0.9" fill="#333"/>
  <!-- Beak -->
  <path d="M15,13 L16,14.5 L17,13" fill="#cc8822"/>
  <!-- Talons -->
  <line x1="13" y1="22" x2="11" y2="27" stroke="#667733" stroke-width="2"/>
  <line x1="19" y1="22" x2="21" y2="27" stroke="#667733" stroke-width="2"/>
  <line x1="11" y1="27" x2="9" y2="30" stroke="#667733" stroke-width="1.5"/>
  <line x1="11" y1="27" x2="12" y2="30" stroke="#667733" stroke-width="1.5"/>
  <line x1="21" y1="27" x2="19" y2="30" stroke="#667733" stroke-width="1.5"/>
  <line x1="21" y1="27" x2="22" y2="30" stroke="#667733" stroke-width="1.5"/>
</svg>
