<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Left wing lowered -->
  <path d="M12,14 L0,20 L2,13 L0,10 L9,13 Z" fill="#226644"/>
  <!-- Right wing lowered -->
  <path d="M20,14 L32,20 L30,13 L32,10 L23,13 Z" fill="#226644"/>
  <!-- Wing feather detail -->
  <line x1="12" y1="14" x2="1" y2="18" stroke="#338855" stroke-width="0.8"/>
  <line x1="12" y1="14" x2="2" y2="12" stroke="#338855" stroke-width="0.8"/>
  <line x1="20" y1="14" x2="31" y2="18" stroke="#338855" stroke-width="0.8"/>
  <line x1="20" y1="14" x2="30" y2="12" stroke="#338855" stroke-width="0.8"/>
  <!-- Body -->
  <ellipse cx="16" cy="18" rx="5" ry="5" fill="#f4c07a"/>
  <ellipse cx="16" cy="20" rx="3.5" ry="3" fill="#338855"/>
  <!-- Head -->
  <ellipse cx="16" cy="11" rx="4.5" ry="4" fill="#f4c07a"/>
