  <circle cx="18" cy="9.5" r="1.3" fill="#cc0000"/>
  <circle cx="14.2" cy="9.3" r="0.5" fill="#ff6666"/>
  <circle cx="18.2" cy="9.3" r="0.5" fill="#ff6666"/>
  <!-- Fangs -->
