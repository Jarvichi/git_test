<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Horned helmet -->
  <rect x="9" y="3" width="14" height="8" rx="2" fill="#777"/>
  <polygon points="9,7 6,2 11,6" fill="#999"/>
  <polygon points="23,7 26,2 21,6" fill="#999"/>
  <!-- Helmet ridge -->
  <rect x="9" y="2" width="14" height="3" rx="1" fill="#aaa"/>
  <!-- Face (angry) -->
  <rect x="10" y="6" width="12" height="8" rx="1" fill="#c8864a"/>
  <!-- Furrowed brows -->
  <line x1="11" y1="8" x2="14" y2="9" stroke="#7a4a2a" stroke-width="1.5"/>
  <line x1="21" y1="8" x2="18" y2="9" stroke="#7a4a2a" stroke-width="1.5"/>
  <!-- Eyes -->
  <ellipse cx="13" cy="10" rx="1.5" ry="1.2" fill="#992200"/>
  <ellipse cx="19" cy="10" rx="1.5" ry="1.2" fill="#992200"/>
  <!-- Beard -->
  <path d="M10,12 Q16,17 22,12 Q20,19 16,20 Q12,19 10,12 Z" fill="#6a3a1a"/>
  <!-- Wide body (furs) -->
  <rect x="7" y="20" width="18" height="8" rx="2" fill="#884422"/>
  <!-- Chest straps / furs -->
  <line x1="12" y1="20" x2="14" y2="28" stroke="#553311" stroke-width="1.5"/>
  <line x1="20" y1="20" x2="18" y2="28" stroke="#553311" stroke-width="1.5"/>
  <!-- Wide arms -->
  <rect x="1" y="20" width="8" height="5" rx="2" fill="#c8864a"/>
  <rect x="23" y="20" width="8" height="5" rx="2" fill="#c8864a"/>
  <!-- Axe (right) -->
  <rect x="29" y="10" width="2" height="18" rx="1" fill="#8B4513"/>
  <path d="M27,9 Q32,9 32,12 Q32,16 27,16 Z" fill="#888"/>
  <path d="M29,9 L31,7 L33,9" fill="#888"/>
  <!-- Legs: left forward (lower), right back (higher) -->
  <rect x="8" y="27" width="6" height="4" rx="1" fill="#663311"/>
  <rect x="18" y="28" width="6" height="3" rx="1" fill="#663311"/>
</svg>
