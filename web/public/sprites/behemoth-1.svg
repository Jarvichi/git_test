<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Massive armoured body (fills canvas) -->
  <ellipse cx="16" cy="20" rx="14" ry="11" fill="#333344"/>
  <!-- Armour plates / ribbing -->
  <ellipse cx="16" cy="19" rx="11" ry="8" fill="#444455" opacity="0.7"/>
  <line x1="5" y1="20" x2="27" y2="20" stroke="#222233" stroke-width="0.8"/>
  <line x1="7" y1="25" x2="25" y2="25" stroke="#222233" stroke-width="0.8"/>
  <line x1="6" y1="16" x2="26" y2="16" stroke="#222233" stroke-width="0.8"/>
  <!-- Massive head (hunched forward) -->
  <ellipse cx="20" cy="8" rx="10" ry="8" fill="#444455"/>
  <!-- Brow ridges -->
  <ellipse cx="20" cy="6" rx="9" ry="4" fill="#333344"/>
  <!-- Eyes (burning red) -->
  <circle cx="16.5" cy="7" r="2.5" fill="#440000"/>
  <circle cx="23.5" cy="7" r="2.5" fill="#440000"/>
  <circle cx="16.5" cy="7" r="1.3" fill="#ff2200"/>
  <circle cx="23.5" cy="7" r="1.3" fill="#ff2200"/>
  <!-- Jaw (massive) -->
  <path d="M12,13 L13,17 L27,17 L28,13" fill="#222233"/>
  <!-- Tusks/fangs -->
  <polygon points="15,14 14,18 17,14" fill="#888877"/>
  <polygon points="21,14 24,14 23,18" fill="#888877"/>
  <!-- Huge left arm swinging back -->
  <ellipse cx="2" cy="19" rx="3" ry="9" fill="#333344"/>
  <!-- Huge right arm raised (fist) -->
  <ellipse cx="30" cy="13" rx="3" ry="8" fill="#333344"/>
  <!-- Spikes on shoulders -->
  <polygon points="5,10 3,5 7,9" fill="#555566"/>
  <polygon points="27,10 29,5 25,9" fill="#555566"/>
  <!-- Legs: left forward -->
  <rect x="7" y="29" width="7" height="3" rx="1" fill="#222233"/>
  <rect x="18" y="29" width="7" height="3" rx="1" fill="#222233"/>
</svg>
