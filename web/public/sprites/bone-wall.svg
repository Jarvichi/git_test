<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Main wall body - pale bone color -->
  <rect x="3" y="10" width="26" height="20" rx="1" fill="#c8b89a"/>
  <!-- Stone/bone texture lines -->
  <line x1="3" y1="17" x2="29" y2="17" stroke="#a89878" stroke-width="0.8"/>
  <line x1="3" y1="24" x2="29" y2="24" stroke="#a89878" stroke-width="0.8"/>
  <line x1="10" y1="10" x2="10" y2="30" stroke="#a89878" stroke-width="0.8"/>
  <line x1="20" y1="10" x2="20" y2="30" stroke="#a89878" stroke-width="0.8"/>
  <!-- Battlements - bone colored -->
  <rect x="3" y="6" width="5" height="6" rx="0.5" fill="#d8c8aa"/>
  <rect x="11" y="6" width="5" height="6" rx="0.5" fill="#d8c8aa"/>
  <rect x="21" y="6" width="5" height="6" rx="0.5" fill="#d8c8aa"/>
  <!-- Skull motifs embedded in wall -->
  <circle cx="6" cy="20" r="2.5" fill="#e8d8b8"/>
  <circle cx="5.2" cy="19.3" r="0.7" fill="#3a2a1a"/>
  <circle cx="6.8" cy="19.3" r="0.7" fill="#3a2a1a"/>
  <path d="M5,21 Q6,22 7,21" stroke="#3a2a1a" stroke-width="0.6" fill="none"/>
  <circle cx="24" cy="20" r="2.5" fill="#e8d8b8"/>
  <circle cx="23.2" cy="19.3" r="0.7" fill="#3a2a1a"/>
  <circle cx="24.8" cy="19.3" r="0.7" fill="#3a2a1a"/>
  <path d="M23,21 Q24,22 25,21" stroke="#3a2a1a" stroke-width="0.6" fill="none"/>
  <!-- Bone fragments on top -->
  <line x1="14" y1="7" x2="17" y2="9" stroke="#e8d8b8" stroke-width="1.5"/>
  <line x1="17" y1="7" x2="14" y2="9" stroke="#e8d8b8" stroke-width="1.5"/>
</svg>
