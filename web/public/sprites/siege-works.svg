<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Workshop building -->
  <rect x="2" y="16" width="28" height="16" rx="1" fill="#8a7a5a"/>
  <!-- Roof with chimney -->
  <polygon points="0,16 16,7 32,16" fill="#7a6a4a"/>
  <rect x="20" y="7" width="4" height="6" fill="#7a6a4a"/>
  <!-- Smoke from chimney -->
  <circle cx="22" cy="6" r="1.5" fill="#777" opacity="0.7"/>
  <circle cx="23" cy="4" r="1.2" fill="#888" opacity="0.5"/>
  <circle cx="21" cy="2" r="1" fill="#999" opacity="0.3"/>
  <!-- Large doors -->
  <rect x="10" y="20" width="12" height="12" rx="1" fill="#5a4000"/>
  <!-- Hinges -->
  <rect x="11" y="22" width="2" height="1.5" fill="#888"/>
  <rect x="11" y="28" width="2" height="1.5" fill="#888"/>
  <rect x="19" y="22" width="2" height="1.5" fill="#888"/>
  <rect x="19" y="28" width="2" height="1.5" fill="#888"/>
  <!-- Catapult arm sticking out of window -->
  <rect x="3" y="17" width="6" height="2" rx="0.5" fill="#7a5000"/>
  <circle cx="3" cy="18" r="1.5" fill="#5a3800"/>
  <!-- Gear symbol -->
  <circle cx="24" cy="19" r="3" fill="#888" stroke="#666" stroke-width="1"/>
  <circle cx="24" cy="19" r="1.5" fill="#777"/>
</svg>
