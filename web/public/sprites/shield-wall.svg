<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Legs -->
  <rect x="11" y="23" width="4" height="7" rx="1" fill="#777"/>
  <rect x="17" y="23" width="4" height="7" rx="1" fill="#777"/>
  <!-- Body - simple armor -->
  <rect x="10" y="14" width="12" height="11" rx="2" fill="#888"/>
  <line x1="16" y1="14" x2="16" y2="25" stroke="#666" stroke-width="0.8"/>
  <!-- Head - simple helmet -->
  <circle cx="16" cy="10" r="5" fill="#999"/>
  <rect x="13" y="13" width="6" height="2" rx="0.5" fill="#777"/>
  <!-- Visor -->
  <line x1="14" y1="11" x2="18" y2="11" stroke="#444" stroke-width="1.5"/>
  <!-- Large tower shield covering left side -->
  <rect x="2" y="9" width="8" height="18" rx="2" fill="#777"/>
  <rect x="3" y="10" width="6" height="16" rx="1" fill="#666"/>
  <!-- Shield cross decoration -->
  <line x1="6" y1="11" x2="6" y2="25" stroke="#888" stroke-width="1"/>
  <line x1="3" y1="18" x2="9" y2="18" stroke="#888" stroke-width="1"/>
  <!-- Short sword right -->
  <rect x="23" y="15" width="2" height="8" rx="0.5" fill="#ccc"/>
  <rect x="21" y="19" width="6" height="1.5" rx="0.5" fill="#aaa"/>
</svg>
