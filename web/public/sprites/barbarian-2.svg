<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Horned helmet (raised 1px mid-stride) -->
  <rect x="9" y="2" width="14" height="8" rx="2" fill="#777"/>
  <polygon points="9,6 6,1 11,5" fill="#999"/>
  <polygon points="23,6 26,1 21,5" fill="#999"/>
  <!-- Helmet ridge -->
  <rect x="9" y="1" width="14" height="3" rx="1" fill="#aaa"/>
  <!-- Face (angry) -->
  <rect x="10" y="5" width="12" height="8" rx="1" fill="#c8864a"/>
  <!-- Furrowed brows -->
  <line x1="11" y1="7" x2="14" y2="8" stroke="#7a4a2a" stroke-width="1.5"/>
  <line x1="21" y1="7" x2="18" y2="8" stroke="#7a4a2a" stroke-width="1.5"/>
  <!-- Eyes -->
  <ellipse cx="13" cy="9" rx="1.5" ry="1.2" fill="#992200"/>
  <ellipse cx="19" cy="9" rx="1.5" ry="1.2" fill="#992200"/>
  <!-- Beard -->
  <path d="M10,11 Q16,16 22,11 Q20,18 16,19 Q12,18 10,11 Z" fill="#6a3a1a"/>
  <!-- Wide body (furs, raised 1px) -->
  <rect x="7" y="19" width="18" height="8" rx="2" fill="#884422"/>
  <!-- Chest straps / furs -->
  <line x1="12" y1="19" x2="14" y2="27" stroke="#553311" stroke-width="1.5"/>
  <line x1="20" y1="19" x2="18" y2="27" stroke="#553311" stroke-width="1.5"/>
  <!-- Wide arms -->
  <rect x="1" y="19" width="8" height="5" rx="2" fill="#c8864a"/>
  <rect x="23" y="19" width="8" height="5" rx="2" fill="#c8864a"/>
  <!-- Axe (right) -->
  <rect x="29" y="9" width="2" height="18" rx="1" fill="#8B4513"/>
  <path d="M27,8 Q32,8 32,11 Q32,15 27,15 Z" fill="#888"/>
  <path d="M29,8 L31,6 L33,8" fill="#888"/>
  <!-- Legs: both mid-stride equal -->
  <rect x="9" y="27" width="5" height="3" rx="1" fill="#663311"/>
  <rect x="18" y="27" width="5" height="3" rx="1" fill="#663311"/>
</svg>
