<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Ground -->
  <ellipse cx="16" cy="30" rx="13" ry="2.5" fill="#6a7a3a"/>
  <!-- Tree trunk -->
  <rect x="13" y="12" width="6" height="20" rx="2" fill="#5a3a1a"/>
  <rect x="14" y="12" width="2" height="18" rx="1" fill="#6a4a2a"/>
  <!-- Dead branches -->
  <line x1="13" y1="18" x2="4" y2="13" stroke="#5a3a1a" stroke-width="2"/>
  <line x1="4" y1="13" x2="2" y2="10" stroke="#5a3a1a" stroke-width="1.5"/>
  <line x1="4" y1="13" x2="6" y2="9" stroke="#5a3a1a" stroke-width="1.2"/>
  <line x1="19" y1="18" x2="28" y2="13" stroke="#5a3a1a" stroke-width="2"/>
  <line x1="28" y1="13" x2="30" y2="10" stroke="#5a3a1a" stroke-width="1.5"/>
  <line x1="28" y1="13" x2="26" y2="9" stroke="#5a3a1a" stroke-width="1.2"/>
  <!-- Nest -->
  <ellipse cx="16" cy="13" rx="9" ry="4" fill="#7a5a2a"/>
  <ellipse cx="16" cy="12" rx="7" ry="3" fill="#5a3a0a"/>
  <!-- Eggs in nest -->
  <ellipse cx="14" cy="12" rx="2" ry="1.5" fill="#d4d0aa"/>
  <ellipse cx="18" cy="12.5" rx="2" ry="1.5" fill="#c8c4a0"/>
  <!-- Teal feathers scattered -->
  <ellipse cx="5" cy="26" rx="2" ry="0.7" fill="#2a8a7a" transform="rotate(-30 5 26)"/>
  <ellipse cx="9" cy="29" rx="2" ry="0.7" fill="#3a9a8a" transform="rotate(10 9 29)"/>
  <ellipse cx="24" cy="28" rx="2" ry="0.7" fill="#2a8a7a" transform="rotate(20 24 28)"/>
  <ellipse cx="27" cy="25" rx="2" ry="0.7" fill="#3a9a8a" transform="rotate(-15 27 25)"/>
  <!-- Harpy silhouette perched on nest -->
  <ellipse cx="16" cy="8" rx="3" ry="2.5" fill="#2a7a6a"/>
  <path d="M13,8 Q9,5 8,8" fill="#2a7a6a"/>
  <path d="M19,8 Q23,5 24,8" fill="#2a7a6a"/>
  <circle cx="17" cy="6.5" r="0.8" fill="#cc4400"/>
</svg>
