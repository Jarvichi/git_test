<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Legs -->
  <rect x="11" y="22" width="4" height="8" rx="1" fill="#6b6b3a"/>
  <rect x="17" y="22" width="4" height="8" rx="1" fill="#6b6b3a"/>
  <!-- Body - engineer's coat -->
  <rect x="10" y="13" width="12" height="11" rx="2" fill="#8b8b4a"/>
  <line x1="16" y1="13" x2="16" y2="24" stroke="#6b6b2a" stroke-width="0.8"/>
  <!-- Tool belt -->
  <rect x="10" y="20" width="12" height="2.5" rx="0.5" fill="#5a4a10"/>
  <rect x="12" y="20" width="2" height="2.5" fill="#888"/>
  <rect x="18" y="20" width="2" height="2.5" fill="#888"/>
  <!-- Head - with goggles -->
  <circle cx="16" cy="9" r="5" fill="#c8a06a"/>
  <rect x="11" y="7" width="10" height="2" rx="1" fill="#5a4a10"/>
  <!-- Goggles -->
  <ellipse cx="13.5" cy="9" rx="2.5" ry="2" fill="#333"/>
  <ellipse cx="18.5" cy="9" rx="2.5" ry="2" fill="#333"/>
  <ellipse cx="13.5" cy="9" rx="1.5" ry="1.2" fill="#4488ff" opacity="0.7"/>
  <ellipse cx="18.5" cy="9" rx="1.5" ry="1.2" fill="#4488ff" opacity="0.7"/>
  <line x1="16" y1="9" x2="16" y2="9" stroke="#555" stroke-width="2"/>
  <!-- Crossbow held out front -->
  <rect x="22" y="14" width="8" height="3" rx="1" fill="#8b6a3a"/>
  <rect x="24" y="12" width="2" height="7" rx="0.5" fill="#6b4a1a"/>
  <line x1="22" y1="15.5" x2="30" y2="15.5" stroke="#555" stroke-width="0.8"/>
  <!-- Bolt -->
  <line x1="28" y1="15.5" x2="31" y2="15.5" stroke="#ccc" stroke-width="1.2"/>
  <!-- Left arm holding crossbow -->
  <ellipse cx="22" cy="16" rx="4" ry="2" fill="#8b8b4a"/>
</svg>
