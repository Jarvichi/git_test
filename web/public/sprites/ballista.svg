<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Wheels (slightly rotated — spoke detail) -->
  <circle cx="7" cy="28" r="4" fill="#5a3a1a" stroke="#3a2010" stroke-width="1"/>
  <line x1="3" y1="28" x2="11" y2="28" stroke="#3a2010" stroke-width="0.8"/>
  <line x1="7" y1="24" x2="7" y2="32" stroke="#3a2010" stroke-width="0.8"/>
  <circle cx="7" cy="28" r="1.5" fill="#3a2010"/>
  <circle cx="25" cy="28" r="4" fill="#5a3a1a" stroke="#3a2010" stroke-width="1"/>
  <line x1="21" y1="28" x2="29" y2="28" stroke="#3a2010" stroke-width="0.8"/>
  <line x1="25" y1="24" x2="25" y2="32" stroke="#3a2010" stroke-width="0.8"/>
  <circle cx="25" cy="28" r="1.5" fill="#3a2010"/>
  <!-- Axle -->
  <line x1="7" y1="28" x2="25" y2="28" stroke="#3a2010" stroke-width="2"/>
  <!-- Frame -->
  <rect x="5" y="20" width="22" height="5" rx="1" fill="#7a5a2a"/>
  <!-- Upright supports -->
  <rect x="7" y="13" width="3" height="9" rx="0.5" fill="#5a3a1a"/>
  <rect x="22" y="13" width="3" height="9" rx="0.5" fill="#5a3a1a"/>
  <!-- Crossbow rail -->
  <rect x="4" y="16" width="24" height="3" rx="1" fill="#8B4513"/>
  <!-- Bow limbs -->
  <path d="M4,14 Q0,17 4,20" stroke="#5a3a1a" stroke-width="2.5" fill="none"/>
  <path d="M28,14 Q32,17 28,20" stroke="#5a3a1a" stroke-width="2.5" fill="none"/>
  <!-- Bowstring -->
  <line x1="4" y1="14" x2="4" y2="20" stroke="#ddccaa" stroke-width="0.8"/>
  <line x1="28" y1="14" x2="28" y2="20" stroke="#ddccaa" stroke-width="0.8"/>
  <!-- Bolt -->
  <line x1="6" y1="17.5" x2="26" y2="17.5" stroke="#6a4a1a" stroke-width="2"/>
  <polygon points="26,17.5 24,16 24,19" fill="#aaaaaa"/>
  <!-- Operator -->
  <ellipse cx="30" cy="17" rx="3" ry="3" fill="#f4c07a"/>
  <rect x="28" y="20" width="5" height="5" rx="1" fill="#886644"/>
</svg>
