<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Muddy ground -->
  <ellipse cx="16" cy="28" rx="14" ry="4" fill="#4a6a1a"/>
  <ellipse cx="16" cy="27" rx="11" ry="3" fill="#3a5a0a"/>
  <!-- Swampy water puddle -->
  <ellipse cx="16" cy="27" rx="8" ry="2" fill="#2a4a0a" opacity="0.7"/>
  <!-- Gnarled roots framing entrance -->
  <path d="M6,22 Q3,18 5,14 Q7,10 10,14 Q8,18 10,22" fill="#5a4a1a"/>
  <path d="M26,22 Q29,18 27,14 Q25,10 22,14 Q24,18 22,22" fill="#5a4a1a"/>
  <!-- Den entrance -->
  <ellipse cx="16" cy="23" rx="8" ry="5" fill="#1a2a0a"/>
  <ellipse cx="16" cy="22" rx="6" ry="3.5" fill="#0a1a04"/>
  <!-- Mud and moss on roots -->
  <path d="M6,22 Q4,20 5,17" stroke="#3a7a1a" stroke-width="1.5" fill="none"/>
  <path d="M26,22 Q28,20 27,17" stroke="#3a7a1a" stroke-width="1.5" fill="none"/>
  <!-- Lizardman eyes glowing in darkness -->
  <ellipse cx="14" cy="21" rx="1.2" ry="0.8" fill="#aaff22" opacity="0.9"/>
  <ellipse cx="18" cy="21" rx="1.2" ry="0.8" fill="#aaff22" opacity="0.9"/>
  <ellipse cx="14" cy="21" rx="0.4" ry="0.7" fill="#001100"/>
  <ellipse cx="18" cy="21" rx="0.4" ry="0.7" fill="#001100"/>
  <!-- Scales texture on ground -->
  <ellipse cx="8" cy="26" rx="1.5" ry="0.8" fill="#336611" opacity="0.6"/>
  <ellipse cx="12" cy="28" rx="1.5" ry="0.8" fill="#336611" opacity="0.6"/>
  <ellipse cx="20" cy="28" rx="1.5" ry="0.8" fill="#336611" opacity="0.6"/>
  <ellipse cx="24" cy="26" rx="1.5" ry="0.8" fill="#336611" opacity="0.6"/>
  <!-- Tail tip visible at entrance -->
  <path d="M20,24 Q24,25 25,27" stroke="#446622" stroke-width="2" fill="none"/>
