<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Leg bones -->
  <line x1="13" y1="22" x2="12" y2="30" stroke="#ddd" stroke-width="2.5"/>
  <line x1="19" y1="22" x2="20" y2="30" stroke="#ddd" stroke-width="2.5"/>
  <circle cx="12" cy="30" r="1.5" fill="#ddd"/>
  <circle cx="20" cy="30" r="1.5" fill="#ddd"/>
  <!-- Pelvis -->
  <ellipse cx="16" cy="22" rx="5" ry="2" fill="#ccc"/>
  <!-- Spine -->
  <line x1="16" y1="22" x2="16" y2="14" stroke="#ccc" stroke-width="2"/>
  <!-- Ribcage -->
  <ellipse cx="16" cy="18" rx="5" ry="4" fill="none" stroke="#ccc" stroke-width="1.5"/>
  <line x1="13" y1="16" x2="19" y2="16" stroke="#ccc" stroke-width="0.8"/>
  <line x1="12" y1="18" x2="20" y2="18" stroke="#ccc" stroke-width="0.8"/>
  <line x1="13" y1="20" x2="19" y2="20" stroke="#ccc" stroke-width="0.8"/>
  <!-- Skull -->
  <circle cx="16" cy="10" r="5" fill="#ddd"/>
  <circle cx="13.5" cy="9.5" r="1.8" fill="#222"/>
  <circle cx="18.5" cy="9.5" r="1.8" fill="#222"/>
  <!-- Nasal cavity -->
  <ellipse cx="16" cy="11.5" rx="1" ry="0.8" fill="#333"/>
  <!-- Jaw -->
  <path d="M13,13 L16,14.5 L19,13" stroke="#ccc" stroke-width="1.5" fill="none"/>
  <!-- Arm pulling bow -->
  <line x1="11" y1="16" x2="5" y2="18" stroke="#ccc" stroke-width="2"/>
  <circle cx="5" cy="18" r="1.5" fill="#ccc"/>
  <!-- Bow -->
  <path d="M6,13 Q3,18 6,23" stroke="#8b6a3a" stroke-width="1.5" fill="none"/>
  <line x1="6" y1="13" x2="6" y2="23" stroke="#8b6a3a" stroke-width="0.8"/>
  <!-- Arrow nocked -->
  <line x1="6" y1="18" x2="22" y2="18" stroke="#aaa" stroke-width="1"/>
  <polygon points="22,17 25,18 22,19" fill="#aaa"/>
</svg>
