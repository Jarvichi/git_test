<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Left wing mid-flap -->
  <path d="M13,16 L0,10 L4,17 L2,20 L10,18 Z" fill="#331144"/>
  <!-- Right wing mid-flap -->
  <path d="M19,16 L32,10 L28,17 L30,20 L22,18 Z" fill="#331144"/>
  <!-- Wing membrane veins -->
  <line x1="13" y1="16" x2="2" y2="11" stroke="#553366" stroke-width="0.7"/>
  <line x1="13" y1="16" x2="4" y2="16" stroke="#553366" stroke-width="0.7"/>
  <line x1="19" y1="16" x2="30" y2="11" stroke="#553366" stroke-width="0.7"/>
  <line x1="19" y1="16" x2="28" y2="16" stroke="#553366" stroke-width="0.7"/>
  <!-- Body -->
  <ellipse cx="16" cy="18" rx="5" ry="4" fill="#221133"/>
  <!-- Ears -->
  <polygon points="13,15 11,9 15,14" fill="#221133"/>
  <polygon points="19,15 21,9 17,14" fill="#221133"/>
  <!-- Face -->
  <circle cx="14" cy="17" r="1.2" fill="#ff2222"/>
  <circle cx="18" cy="17" r="1.2" fill="#ff2222"/>
  <circle cx="14.3" cy="16.7" r="0.5" fill="#fff"/>
  <circle cx="18.3" cy="16.7" r="0.5" fill="#fff"/>
  <!-- Fangs -->
  <polygon points="15,20 15.8,22.5 16.6,20" fill="#ffffff"/>
  <!-- Feet/claws -->
  <line x1="14" y1="21" x2="13" y2="25" stroke="#221133" stroke-width="1.2"/>
  <line x1="18" y1="21" x2="19" y2="25" stroke="#221133" stroke-width="1.2"/>
</svg>
