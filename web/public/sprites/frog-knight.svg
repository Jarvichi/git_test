<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Armor breastplate -->
  <rect x="11" y="16" width="10" height="9" rx="2" fill="#888"/>
  <line x1="16" y1="16" x2="16" y2="25" stroke="#666" stroke-width="0.8"/>
  <!-- Head - frog-shaped, wide -->
  <ellipse cx="16" cy="11" rx="8" ry="6" fill="#44aa33"/>
  <!-- Eyes on top, bulging -->
  <circle cx="11" cy="8" r="3" fill="#55cc44"/>
  <circle cx="21" cy="8" r="3" fill="#55cc44"/>
  <circle cx="11" cy="7.5" r="1.5" fill="#111"/>
  <circle cx="21" cy="7.5" r="1.5" fill="#111"/>
  <circle cx="10.5" cy="7" r="0.7" fill="#ffff44"/>
  <circle cx="20.5" cy="7" r="0.7" fill="#ffff44"/>
  <!-- Wide frog mouth -->
  <path d="M10,13 Q16,16 22,13" stroke="#1a6a0a" stroke-width="1.5" fill="none"/>
  <!-- Helmet rim -->
  <rect x="9" y="13" width="14" height="3" rx="1" fill="#777"/>
  <!-- Shield on left arm -->
  <ellipse cx="7" cy="20" rx="4" ry="5" fill="#666"/>
  <ellipse cx="7" cy="20" rx="3" ry="4" fill="#888"/>
  <circle cx="7" cy="20" r="1.5" fill="#aaa"/>
  <!-- Sword on right -->
  <rect x="24" y="14" width="2" height="10" rx="0.5" fill="#ccc"/>
  <rect x="22" y="18" width="6" height="1.5" rx="0.5" fill="#aaa"/>
  <!-- Legs - big frog legs -->
  <ellipse cx="12" cy="27" rx="4" ry="3" fill="#44aa33" transform="rotate(20,12,27)"/>
  <ellipse cx="20" cy="27" rx="4" ry="3" fill="#44aa33" transform="rotate(-20,20,27)"/>
  <!-- Feet -->
  <ellipse cx="10" cy="30" rx="3" ry="1.5" fill="#33882a"/>
  <ellipse cx="22" cy="30" rx="3" ry="1.5" fill="#33882a"/>
</svg>
