<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Shadowy building -->
  <rect x="4" y="16" width="24" height="16" rx="1" fill="#2a2a2a"/>
  <!-- Sloped roof -->
  <polygon points="2,16 16,6 30,16" fill="#1a1a1a"/>
  <!-- Moon symbol on roof -->
  <path d="M14,10 Q16,7 18,10 Q16,8.5 14,10 Z" fill="#aaa"/>
  <!-- Shuttered windows -->
  <rect x="6" y="19" width="6" height="5" rx="0.5" fill="#1a1a1a"/>
  <line x1="9" y1="19" x2="9" y2="24" stroke="#333" stroke-width="0.7"/>
  <line x1="6" y1="21.5" x2="12" y2="21.5" stroke="#333" stroke-width="0.7"/>
  <rect x="20" y="19" width="6" height="5" rx="0.5" fill="#1a1a1a"/>
  <line x1="23" y1="19" x2="23" y2="24" stroke="#333" stroke-width="0.7"/>
  <line x1="20" y1="21.5" x2="26" y2="21.5" stroke="#333" stroke-width="0.7"/>
  <!-- Dark doorway -->
  <rect x="13" y="24" width="6" height="8" rx="2" fill="#111"/>
  <!-- Wanted posters hint -->
  <rect x="5" y="26" width="4" height="5" rx="0.3" fill="#c8a020" opacity="0.7"/>
  <rect x="23" y="26" width="4" height="5" rx="0.3" fill="#c8a020" opacity="0.7"/>
  <!-- Glowing eyes peeking -->
  <circle cx="14.5" cy="27" r="0.8" fill="#00ddaa" opacity="0.9"/>
  <circle cx="17.5" cy="27" r="0.8" fill="#00ddaa" opacity="0.9"/>
</svg>
