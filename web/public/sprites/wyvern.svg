<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Left wing mid -->
  <path d="M13,15 L0,8 L3,15 L0,19 L10,16 Z" fill="#1a4a1a"/>
  <!-- Right wing mid -->
  <path d="M20,15 L32,8 L29,15 L32,19 L22,16 Z" fill="#1a4a1a"/>
  <!-- Wing membrane -->
  <line x1="13" y1="15" x2="2" y2="9" stroke="#336633" stroke-width="0.8"/>
  <line x1="13" y1="15" x2="3" y2="14" stroke="#336633" stroke-width="0.8"/>
  <line x1="20" y1="15" x2="30" y2="9" stroke="#336633" stroke-width="0.8"/>
  <line x1="20" y1="15" x2="29" y2="14" stroke="#336633" stroke-width="0.8"/>
  <!-- Body (raised 1px) -->
  <ellipse cx="16" cy="20" rx="7" ry="5" fill="#225522"/>
  <ellipse cx="16" cy="21" rx="4.5" ry="3" fill="#449944"/>
  <!-- Neck -->
  <path d="M19,16 Q23,12 26,10" fill="#225522" stroke="#225522" stroke-width="3"/>
  <!-- Head -->
  <ellipse cx="27" cy="9" rx="5" ry="4" fill="#225522"/>
  <!-- Snout -->
  <path d="M30,8 L32,10 L31,13 L29,11 Z" fill="#1a4a1a"/>
  <!-- Eye -->
  <circle cx="27" cy="7.5" r="1.5" fill="#ff8800"/>
  <ellipse cx="27" cy="7.5" rx="0.5" ry="1.3" fill="#111"/>
  <!-- Horn -->
  <polygon points="25,6 24,2 27,5" fill="#1a4a1a"/>
  <!-- Tail -->
  <path d="M9,22 Q4,25 3,21 Q3,17 6,16" stroke="#225522" stroke-width="3" fill="none"/>
  <polygon points="6,15 4,12 8,14" fill="#1a4a1a"/>
  <!-- Legs -->
  <line x1="13" y1="23" x2="11" y2="27" stroke="#1a4a1a" stroke-width="2.5"/>
  <line x1="19" y1="23" x2="21" y2="27" stroke="#1a4a1a" stroke-width="2.5"/>
</svg>
