<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Ash cloud body - wispy, asymmetric -->
  <ellipse cx="16" cy="18" rx="9" ry="8" fill="#555" opacity="0.9"/>
  <ellipse cx="13" cy="14" rx="6" ry="5" fill="#666" opacity="0.8"/>
  <ellipse cx="20" cy="15" rx="5" ry="4" fill="#5a5a5a" opacity="0.8"/>
  <!-- Ember core - glowing orange -->
  <circle cx="16" cy="16" r="5" fill="#cc5500"/>
  <circle cx="16" cy="16" r="3" fill="#ff8800"/>
  <circle cx="16" cy="16" r="1.5" fill="#ffcc44"/>
  <!-- Face - burning eyes -->
  <circle cx="13.5" cy="14" r="2" fill="#ff4400"/>
  <circle cx="18.5" cy="14" r="2" fill="#ff4400"/>
  <circle cx="13.5" cy="14" r="1" fill="#ffcc44"/>
  <circle cx="18.5" cy="14" r="1" fill="#ffcc44"/>
  <!-- Mouth - jagged fire -->
  <path d="M12,17 L13.5,18.5 L15,17 L16.5,18.5 L18,17 L19.5,18.5 L21,17" stroke="#ff6600" stroke-width="1" fill="none"/>
  <!-- Floating ash wisps -->
  <ellipse cx="8" cy="12" rx="3" ry="2" fill="#444" opacity="0.6" transform="rotate(-20,8,12)"/>
  <ellipse cx="24" cy="11" rx="3" ry="2" fill="#444" opacity="0.6" transform="rotate(20,24,11)"/>
  <ellipse cx="10" cy="22" rx="2.5" ry="1.5" fill="#444" opacity="0.5"/>
  <ellipse cx="22" cy="23" rx="2.5" ry="1.5" fill="#444" opacity="0.5"/>
  <!-- Ember particles -->
  <circle cx="7" cy="9" r="1" fill="#ff6600" opacity="0.8"/>
  <circle cx="25" cy="8" r="0.8" fill="#ff8800" opacity="0.8"/>
  <circle cx="11" cy="25" r="0.8" fill="#cc4400" opacity="0.7"/>
  <circle cx="22" cy="26" r="1" fill="#ff4400" opacity="0.7"/>
</svg>
