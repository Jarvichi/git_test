<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Ground -->
  <rect x="1" y="29" width="30" height="3" rx="1" fill="#7a6a3a"/>
  <!-- Massive longhouse walls -->
  <rect x="2" y="16" width="28" height="15" rx="1" fill="#8a6a3a"/>
  <rect x="2" y="16" width="28" height="4" fill="#9a7a4a"/>
  <!-- Thatched roof -->
  <polygon points="1,16 16,3 31,16" fill="#6a5a2a"/>
  <polygon points="3,16 16,5 29,16" fill="#7a6a3a"/>
  <!-- Roof ridge beam -->
  <rect x="14" y="3" width="4" height="13" rx="1" fill="#5a4a1a"/>
  <!-- Dragon skull trophy on roof peak -->
  <ellipse cx="16" cy="3" rx="3" ry="2.5" fill="#bbaa88"/>
  <polygon points="14,3 12,1 14,2" fill="#bbaa88"/>
  <polygon points="18,3 20,1 18,2" fill="#bbaa88"/>
  <circle cx="14.5" cy="2.2" r="0.7" fill="#221100"/>
  <circle cx="17.5" cy="2.2" r="0.7" fill="#221100"/>
  <!-- Massive double door -->
  <rect x="10" y="21" width="12" height="10" rx="1" fill="#4a2a0a"/>
  <rect x="10" y="21" width="5.5" height="10" rx="1" fill="#5a3a1a"/>
  <rect x="15.5" y="21" width="6.5" height="10" rx="1" fill="#5a3a1a"/>
  <!-- Door iron bolts -->
  <circle cx="12" cy="25" r="0.8" fill="#888877"/>
  <circle cx="20" cy="25" r="0.8" fill="#888877"/>
  <!-- Torch sconces -->
  <rect x="5" y="20" width="2" height="5" rx="0.5" fill="#6a4a2a"/>
  <ellipse cx="6" cy="19" rx="1.5" ry="2" fill="#ff6600" opacity="0.8"/>
  <ellipse cx="6" cy="19" rx="0.8" ry="1.2" fill="#ffcc00" opacity="0.8"/>
  <rect x="25" y="20" width="2" height="5" rx="0.5" fill="#6a4a2a"/>
  <ellipse cx="26" cy="19" rx="1.5" ry="2" fill="#ff6600" opacity="0.8"/>
  <ellipse cx="26" cy="19" rx="0.8" ry="1.2" fill="#ffcc00" opacity="0.8"/>
  <!-- Animal skull on wall -->
  <ellipse cx="16" cy="19" rx="2.5" ry="2" fill="#ccc8aa"/>
  <circle cx="14.8" cy="18.5" r="0.6" fill="#2a1a0a"/>
  <circle cx="17.2" cy="18.5" r="0.6" fill="#2a1a0a"/>
</svg>
