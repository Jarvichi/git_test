<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Forge building (large, industrial) -->
  <rect x="2" y="14" width="28" height="18" rx="1" fill="#555"/>
  <!-- Sloped roof -->
  <polygon points="0,14 16,4 32,14" fill="#444"/>
  <!-- Multiple chimneys belching smoke -->
  <rect x="8" y="4" width="3" height="8" fill="#444"/>
  <rect x="14" y="2" width="3" height="10" fill="#444"/>
  <rect x="20" y="5" width="3" height="7" fill="#444"/>
  <!-- Smoke / fire from chimneys -->
  <circle cx="9.5" cy="3" r="2" fill="#ff4400" opacity="0.8"/>
  <circle cx="15.5" cy="1" r="2.5" fill="#ff6600" opacity="0.7"/>
  <circle cx="21.5" cy="4" r="2" fill="#ff4400" opacity="0.8"/>
  <circle cx="10.5" cy="1" r="1.5" fill="#ff8800" opacity="0.5"/>
  <circle cx="16.5" cy="-1" r="1.5" fill="#ffaa00" opacity="0.4"/>
  <!-- Large furnace door (glowing) -->
  <rect x="11" y="20" width="10" height="8" rx="2" fill="#ff4400"/>
  <rect x="12" y="21" width="8" height="6" rx="1.5" fill="#ff8800"/>
  <rect x="13.5" y="22" width="5" height="4" rx="1" fill="#ffcc00"/>
  <!-- Hammer and anvil icon -->
  <rect x="4" y="16" width="6" height="4" rx="0.5" fill="#888"/>
  <rect x="5" y="14" width="4" height="3" rx="0.3" fill="#777"/>
  <rect x="24" y="17" width="5" height="3" rx="0.3" fill="#888"/>
  <rect x="25" y="13" width="2" height="5" rx="0.3" fill="#777"/>
</svg>
