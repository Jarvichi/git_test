<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Pointed ear left -->
  <polygon points="9,10 6,4 12,8" fill="#665577"/>
  <!-- Pointed ear right (less visible) -->
  <polygon points="21,10 24,4 20,8" fill="#665577"/>
  <!-- Head -->
  <ellipse cx="16" cy="10" rx="6" ry="5.5" fill="#776688"/>
  <!-- White hair -->
  <path d="M10,9 Q16,3 22,9 Q20,6 16,7 Q12,6 10,9 Z" fill="#ffffff"/>
  <!-- Eyes (pale violet) -->
  <circle cx="14" cy="10" r="1.2" fill="#ccaaff"/>
  <circle cx="18" cy="10" r="1.2" fill="#ccaaff"/>
  <circle cx="14" cy="10" r="0.5" fill="#111"/>
  <circle cx="18" cy="10" r="0.5" fill="#111"/>
  <!-- Body (dark armour) -->
  <rect x="11" y="15" width="10" height="8" rx="1" fill="#332244"/>
  <!-- Purple cape -->
  <path d="M11,15 L9,28 L16,24 L23,28 L21,15 Z" fill="#441166" opacity="0.8"/>
  <!-- Quiver on back -->
  <rect x="22" y="13" width="3" height="8" rx="1" fill="#5a3a1a"/>
  <line x1="23" y1="12" x2="23" y2="14" stroke="#ccaaff" stroke-width="0.8"/>
  <!-- Bow (extended left) -->
  <path d="M5,8 Q1,16 5,24" stroke="#332244" stroke-width="2" fill="none"/>
  <line x1="5" y1="8" x2="5" y2="24" stroke="#cccccc" stroke-width="0.7"/>
  <!-- Arrow -->
  <line x1="5" y1="16" x2="13" y2="16" stroke="#5a3a1a" stroke-width="1.5"/>
  <polygon points="13,16 11,14.5 11,17.5" fill="#ccaaff"/>
  <!-- Legs: left forward, right back -->
  <rect x="11" y="23" width="4" height="8" rx="1" fill="#221133"/>
  <rect x="17" y="23" width="4" height="6" rx="1" fill="#221133"/>
</svg>
