<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Wall base -->
  <rect x="4" y="18" width="24" height="12" rx="1" fill="#3d5c1a"/>
  <!-- Bark texture -->
  <line x1="10" y1="18" x2="10" y2="30" stroke="#2a3f10" stroke-width="0.8"/>
  <line x1="16" y1="18" x2="16" y2="30" stroke="#2a3f10" stroke-width="0.8"/>
  <line x1="22" y1="18" x2="22" y2="30" stroke="#2a3f10" stroke-width="0.8"/>
  <line x1="4" y1="23" x2="28" y2="23" stroke="#2a3f10" stroke-width="0.8"/>
  <!-- Thorn spikes along top -->
  <polygon points="5,18 6,10 7,18" fill="#1a3a0a"/>
  <polygon points="9,18 10,9 11,18" fill="#1a3a0a"/>
  <polygon points="13,18 14,11 15,18" fill="#1a3a0a"/>
  <polygon points="17,18 18,8 19,18" fill="#1a3a0a"/>
  <polygon points="21,18 22,10 23,18" fill="#1a3a0a"/>
  <polygon points="25,18 26,12 27,18" fill="#1a3a0a"/>
  <!-- Vine tendrils -->
  <path d="M7,22 Q5,19 8,17" stroke="#4a8c2a" stroke-width="1.2" fill="none"/>
  <path d="M20,24 Q22,20 19,18" stroke="#4a8c2a" stroke-width="1.2" fill="none"/>
  <!-- Small leaves -->
  <ellipse cx="8" cy="17" rx="2" ry="1.2" fill="#66cc33" transform="rotate(-30,8,17)"/>
  <ellipse cx="19" cy="17" rx="2" ry="1.2" fill="#66cc33" transform="rotate(20,19,17)"/>
</svg>
