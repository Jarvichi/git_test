<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Wolf head / snout -->
  <ellipse cx="16" cy="7" rx="7" ry="6" fill="#6a5a4a"/>
  <!-- Ears -->
  <polygon points="10,3 8,0 13,4" fill="#5a4a3a"/>
  <polygon points="22,3 24,0 19,4" fill="#5a4a3a"/>
  <!-- Inner ears -->
  <polygon points="10.5,3 9,1 13,4" fill="#cc8888"/>
  <polygon points="21.5,3 23,1 19,4" fill="#cc8888"/>
  <!-- Snout -->
  <ellipse cx="16" cy="10" rx="4" ry="3" fill="#7a6a5a"/>
  <!-- Nose -->
  <ellipse cx="16" cy="9" rx="2" ry="1.2" fill="#222"/>
  <!-- Eyes (yellow) -->
  <ellipse cx="13" cy="7" rx="1.8" ry="1.5" fill="#ffcc00"/>
  <ellipse cx="19" cy="7" rx="1.8" ry="1.5" fill="#ffcc00"/>
  <circle cx="13.4" cy="7" r="0.8" fill="#111"/>
  <circle cx="19.4" cy="7" r="0.8" fill="#111"/>
  <!-- Fangs -->
  <polygon points="14,12 13,14 15,12" fill="#eee"/>
  <polygon points="18,12 17,14 19,12" fill="#eee"/>
  <!-- Furry body -->
  <ellipse cx="16" cy="21" rx="8" ry="9" fill="#6a5a4a"/>
  <!-- Chest fur detail -->
  <path d="M13,13 Q16,16 19,13 Q16,18 13,13 Z" fill="#8a7a6a"/>
  <!-- Arms -->
  <ellipse cx="6" cy="19" rx="4" ry="3" fill="#6a5a4a" transform="rotate(15 6 19)"/>
  <ellipse cx="26" cy="19" rx="4" ry="3" fill="#6a5a4a" transform="rotate(-15 26 19)"/>
  <!-- Claws -->
  <line x1="3" y1="22" x2="1" y2="24" stroke="#ccc" stroke-width="1"/>
  <line x1="4" y1="23" x2="2" y2="25" stroke="#ccc" stroke-width="1"/>
  <line x1="29" y1="22" x2="31" y2="24" stroke="#ccc" stroke-width="1"/>
  <line x1="28" y1="23" x2="30" y2="25" stroke="#ccc" stroke-width="1"/>
  <!-- Legs -->
  <ellipse cx="12" cy="29" rx="4" ry="3" fill="#5a4a3a"/>
  <ellipse cx="20" cy="29" rx="4" ry="3" fill="#5a4a3a"/>
</svg>
