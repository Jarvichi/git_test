<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Body - hunched beast -->
  <ellipse cx="16" cy="19" rx="7" ry="6" fill="#3d5c1a"/>
  <!-- Thorn spikes on back -->
  <polygon points="12,14 11,8 13,14" fill="#1a3a0a"/>
  <polygon points="16,13 15,7 17,13" fill="#1a3a0a"/>
  <polygon points="20,14 19,8 21,14" fill="#1a3a0a"/>
  <!-- Head - low slung -->
  <ellipse cx="22" cy="16" rx="5" ry="4" fill="#4a7020"/>
  <!-- Eyes - red -->
  <circle cx="24" cy="15" r="1.5" fill="#111"/>
  <circle cx="21" cy="15.5" r="1.5" fill="#111"/>
  <circle cx="24" cy="14.7" r="0.7" fill="#ee3333"/>
  <circle cx="21" cy="15.2" r="0.7" fill="#ee3333"/>
  <!-- Jaw / snout -->
  <ellipse cx="27" cy="17" rx="3" ry="2" fill="#3d5c1a"/>
  <line x1="25" y1="17" x2="29" y2="17" stroke="#1a3a0a" stroke-width="1"/>
  <!-- Fore claws -->
  <ellipse cx="9" cy="22" rx="4" ry="2.5" fill="#3d5c1a" transform="rotate(20,9,22)"/>
  <polygon points="6,24 5,27 7,25" fill="#1a3a0a"/>
  <polygon points="8,25 7,28 9,26" fill="#1a3a0a"/>
  <!-- Hind legs -->
  <rect x="10" y="24" width="4" height="6" rx="2" fill="#3d5c1a"/>
  <rect x="17" y="24" width="4" height="6" rx="2" fill="#3d5c1a"/>
  <!-- Side thorns -->
  <polygon points="9,18 5,16 9,20" fill="#1a3a0a"/>
  <polygon points="11,16 8,13 12,17" fill="#1a3a0a"/>
</svg>
