<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Head -->
  <ellipse cx="16" cy="7" rx="8" ry="7" fill="#8a9a4a"/>
  <!-- Brow -->
  <ellipse cx="16" cy="4" rx="7" ry="3" fill="#6a7a3a"/>
  <!-- Horns -->
  <polygon points="10,3 8,0 12,4" fill="#5a6a2a"/>
  <polygon points="22,3 24,0 20,4" fill="#5a6a2a"/>
  <!-- Eyes (beady) -->
  <circle cx="13" cy="7" r="2" fill="#ffaa00"/>
  <circle cx="19" cy="7" r="2" fill="#ffaa00"/>
  <circle cx="13.3" cy="7" r="1" fill="#111"/>
  <circle cx="19.3" cy="7" r="1" fill="#111"/>
  <!-- Flat nose -->
  <ellipse cx="16" cy="11" rx="3" ry="2" fill="#6a7a3a"/>
  <circle cx="14.5" cy="11.5" r="1" fill="#5a6a2a"/>
  <circle cx="17.5" cy="11.5" r="1" fill="#5a6a2a"/>
  <!-- Mouth / jaw -->
  <path d="M11,13 Q16,17 21,13" fill="#5a6a2a"/>
  <rect x="13" y="14" width="2.5" height="3" rx="0.3" fill="#ddd"/>
  <rect x="16.5" y="14" width="2.5" height="3" rx="0.3" fill="#ddd"/>
  <!-- Stocky body -->
  <rect x="8" y="13" width="16" height="12" rx="3" fill="#8a9a4a"/>
  <!-- Belt -->
  <rect x="8" y="22" width="16" height="2.5" fill="#5a3800"/>
  <rect x="14" y="21.5" width="4" height="3.5" fill="#c8a020"/>
  <!-- Club held right -->
  <rect x="23" y="10" width="4" height="14" rx="2" fill="#7a5000"/>
  <ellipse cx="25" cy="10" rx="4" ry="3" fill="#5a3800"/>
  <!-- Left arm -->
  <ellipse cx="5" cy="19" rx="4" ry="3" fill="#8a9a4a" transform="rotate(10 5 19)"/>
  <ellipse cx="3" cy="22" rx="3" ry="2" fill="#7a8a3a"/>
  <!-- Legs -->
  <rect x="10" y="25" width="5" height="7" rx="2" fill="#7a8a3a"/>
  <rect x="17" y="25" width="5" height="7" rx="2" fill="#7a8a3a"/>
</svg>
