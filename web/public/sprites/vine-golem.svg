<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Body - twisted vine mass -->
  <ellipse cx="16" cy="18" rx="8" ry="9" fill="#2d5a1b"/>
  <!-- Vine wraps -->
  <path d="M10,14 Q8,18 10,22" stroke="#4a8c2a" stroke-width="2" fill="none"/>
  <path d="M22,14 Q24,18 22,22" stroke="#4a8c2a" stroke-width="2" fill="none"/>
  <path d="M12,12 Q16,10 20,12" stroke="#3d7a22" stroke-width="1.5" fill="none"/>
  <!-- Head - mossy sphere -->
  <circle cx="16" cy="9" r="6" fill="#3a7a20"/>
  <!-- Eyes - glowing green -->
  <circle cx="13.5" cy="8.5" r="1.8" fill="#111"/>
  <circle cx="18.5" cy="8.5" r="1.8" fill="#111"/>
  <circle cx="13.5" cy="8.2" r="0.9" fill="#88ee44"/>
  <circle cx="18.5" cy="8.2" r="0.9" fill="#88ee44"/>
  <!-- Mouth - jagged bark crack -->
  <path d="M13,11 L14.5,12 L16,11 L17.5,12 L19,11" stroke="#1a3a0a" stroke-width="1" fill="none"/>
  <!-- Arms - thick vine limbs -->
  <ellipse cx="7" cy="17" rx="5" ry="3" fill="#2d5a1b" transform="rotate(-15,7,17)"/>
  <ellipse cx="25" cy="17" rx="5" ry="3" fill="#2d5a1b" transform="rotate(15,25,17)"/>
  <!-- Leaf tufts -->
  <ellipse cx="5" cy="14" rx="3" ry="2" fill="#4aaa22" transform="rotate(-30,5,14)"/>
  <ellipse cx="27" cy="14" rx="3" ry="2" fill="#4aaa22" transform="rotate(30,27,14)"/>
  <!-- Legs -->
  <rect x="11" y="25" width="4" height="6" rx="2" fill="#2d5a1b"/>
  <rect x="17" y="25" width="4" height="6" rx="2" fill="#2d5a1b"/>
</svg>
