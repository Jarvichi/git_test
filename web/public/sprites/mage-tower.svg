<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Tower base platform -->
  <ellipse cx="16" cy="30" rx="11" ry="3" fill="#776655"/>
  <!-- Tower body -->
  <rect x="10" y="10" width="12" height="22" rx="2" fill="#886655"/>
  <rect x="10" y="10" width="12" height="4" fill="#997766"/>
  <!-- Conical roof -->
  <polygon points="9,10 16,0 23,10" fill="#993322"/>
  <polygon points="11,10 16,2 21,10" fill="#aa4433"/>
  <!-- Glowing orb / fireball at spire tip -->
  <circle cx="16" cy="1" r="2.5" fill="#ff6600" opacity="0.9"/>
  <circle cx="16" cy="1" r="1.5" fill="#ffcc00"/>
  <!-- Arched windows with orange glow -->
  <rect x="13" y="14" width="6" height="8" rx="3" fill="#221100"/>
  <rect x="13.5" y="14" width="5" height="7" rx="2.5" fill="#ff4400" opacity="0.6"/>
  <!-- Rune markings on tower -->
  <text x="11.5" y="25" font-size="4" fill="#ff8800" opacity="0.8" font-family="serif">✦</text>
  <line x1="11" y1="27" x2="13" y2="28" stroke="#ff6600" stroke-width="0.8" opacity="0.7"/>
  <line x1="11" y1="28" x2="13" y2="27" stroke="#ff6600" stroke-width="0.8" opacity="0.7"/>
  <line x1="19" y1="27" x2="21" y2="28" stroke="#ff6600" stroke-width="0.8" opacity="0.7"/>
  <line x1="19" y1="28" x2="21" y2="27" stroke="#ff6600" stroke-width="0.8" opacity="0.7"/>
  <!-- Door -->
  <rect x="13" y="26" width="6" height="6" rx="1" fill="#4a2a1a"/>
  <rect x="13.5" y="26.5" width="5" height="5" rx="0.8" fill="#331a0a"/>
  <!-- Magical sparks around tower -->
  <circle cx="8" cy="15" r="1" fill="#ff8800" opacity="0.7"/>
  <circle cx="24" cy="18" r="1" fill="#ffcc00" opacity="0.7"/>
  <circle cx="7" cy="22" r="0.8" fill="#ff4400" opacity="0.5"/>
  <circle cx="25" cy="12" r="0.8" fill="#ff8800" opacity="0.5"/>
</svg>
