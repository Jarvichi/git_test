<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Horse body -->
  <ellipse cx="14" cy="22" rx="11" ry="6" fill="#884422"/>
  <!-- Horse neck -->
  <path d="M20,17 Q22,13 24,12 Q26,12 26,15" fill="#884422"/>
  <!-- Horse head -->
  <ellipse cx="26" cy="15" rx="5" ry="4" fill="#994433"/>
  <!-- Horse ear -->
  <polygon points="24,12 23,8 26,11" fill="#884422"/>
  <!-- Horse nostril -->
  <ellipse cx="30" cy="16" rx="0.8" ry="0.5" fill="#662211"/>
  <!-- Horse eye -->
  <circle cx="27" cy="13.5" r="1" fill="#111"/>
  <!-- Horse mane -->
  <path d="M20,17 Q21,12 24,10 Q22,13 23,16" fill="#cc7744"/>
  <!-- Human torso -->
  <rect x="12" y="11" width="9" height="8" rx="2" fill="#f4c07a"/>
  <!-- Chest armour -->
  <rect x="13" y="11" width="7" height="6" rx="1" fill="#cc8833"/>
  <!-- Human head -->
  <ellipse cx="16" cy="8" rx="4.5" ry="4" fill="#f4c07a"/>
  <!-- Hair -->
  <path d="M12,7 Q16,2 20,7" fill="#882211"/>
  <!-- Eyes -->
  <circle cx="14.5" cy="8" r="0.8" fill="#333"/>
  <circle cx="17.5" cy="8" r="0.8" fill="#333"/>
  <!-- Spear -->
  <line x1="21" y1="7" x2="32" y2="4" stroke="#8B4513" stroke-width="1.5"/>
  <polygon points="32,3 31,5 30,3.5" fill="#aaaaaa"/>
  <!-- Left arm -->
  <line x1="12" y1="14" x2="6" y2="12" stroke="#f4c07a" stroke-width="2"/>
  <!-- Horse legs frame 3 (opposite of frame 1) -->
  <rect x="18" y="27" width="3" height="5" rx="1" fill="#662211"/>
  <rect x="13" y="26" width="3" height="7" rx="1" fill="#662211"/>
  <rect x="8" y="27" width="3" height="5" rx="1" fill="#662211"/>
  <rect x="4" y="26" width="3" height="7" rx="1" fill="#662211"/>
</svg>
