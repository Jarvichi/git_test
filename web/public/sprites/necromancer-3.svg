<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Tall pointed hood -->
  <polygon points="16,0 10,12 22,12" fill="#111122"/>
  <rect x="8" y="10" width="16" height="4" rx="0.5" fill="#221133"/>
  <!-- Head (gaunt, pale) -->
  <ellipse cx="16" cy="14" rx="5" ry="5.5" fill="#e0d8cc"/>
  <!-- Sunken eyes (green glow) -->
  <circle cx="13.5" cy="13" r="1.8" fill="#003300"/>
  <circle cx="18.5" cy="13" r="1.8" fill="#003300"/>
  <circle cx="13.5" cy="13" r="1" fill="#00ff66" opacity="0.8"/>
  <circle cx="18.5" cy="13" r="1" fill="#00ff66" opacity="0.8"/>
  <!-- Gaunt jaw / mouth -->
  <path d="M13,17 Q16,19 19,17" stroke="#aaa" stroke-width="1" fill="none"/>
  <!-- Long dark robes -->
  <path d="M10,19 L7,32 L25,32 L22,19 Z" fill="#111122"/>
  <!-- Belt -->
  <rect x="10" y="22" width="12" height="2" fill="#330044"/>
  <!-- Skull staff (left arm raising it) -->
  <line x1="8" y1="20" x2="3" y2="4" stroke="#5a3a1a" stroke-width="2"/>
  <!-- Skull atop staff -->
  <circle cx="3" cy="4" r="3" fill="#e0d8cc"/>
  <circle cx="2" cy="3.5" r="0.8" fill="#333"/>
  <circle cx="4" cy="3.5" r="0.8" fill="#333"/>
  <path d="M1.5,6 Q3,7.5 4.5,6" stroke="#888" stroke-width="0.7" fill="none"/>
  <!-- Bony right hand extending forward -->
  <line x1="22" y1="20" x2="28" y2="16" stroke="#111122" stroke-width="3"/>
  <line x1="28" y1="16" x2="30" y2="14" stroke="#e0d8cc" stroke-width="1.5"/>
  <line x1="28" y1="16" x2="29" y2="18" stroke="#e0d8cc" stroke-width="1.5"/>
  <!-- Green death magic from hand -->
  <circle cx="30" cy="14" r="2" fill="#00ff66" opacity="0.7"/>
  <!-- Legs barely visible under robes -->
  <line x1="13" y1="30" x2="12" y2="32" stroke="#221133" stroke-width="3"/>
  <line x1="19" y1="30" x2="20" y2="32" stroke="#221133" stroke-width="3"/>
</svg>
