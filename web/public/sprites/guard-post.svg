<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Tower base -->
  <rect x="8" y="14" width="16" height="18" rx="1" fill="#888899"/>
  <rect x="8" y="14" width="16" height="3" fill="#9999aa"/>
  <!-- Battlements / merlons -->
  <rect x="7" y="9" width="4" height="6" rx="0.5" fill="#7a7a8a"/>
  <rect x="14" y="9" width="4" height="6" rx="0.5" fill="#7a7a8a"/>
  <rect x="21" y="9" width="4" height="6" rx="0.5" fill="#7a7a8a"/>
  <!-- Parapet fill between merlons -->
  <rect x="7" y="13" width="18" height="2" fill="#888899"/>
  <!-- Arrow slits -->
  <rect x="14" y="18" width="4" height="6" rx="0.5" fill="#3a3a4a"/>
  <rect x="15" y="17" width="2" height="8" rx="0.5" fill="#3a3a4a"/>
  <!-- Door -->
  <rect x="13" y="26" width="6" height="6" rx="1" fill="#5a3a1a"/>
  <rect x="14" y="27" width="2" height="5" rx="0.5" fill="#3a2a0a"/>
  <rect x="16" y="27" width="2" height="5" rx="0.5" fill="#3a2a0a"/>
  <!-- Flag pole -->
  <rect x="19" y="2" width="1.5" height="9" rx="0.5" fill="#5a3a1a"/>
  <!-- Flag -->
  <polygon points="20.5,2 20.5,7 26,4.5" fill="#cc2200"/>
</svg>
