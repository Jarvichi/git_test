<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Ground -->
  <ellipse cx="16" cy="31" rx="12" ry="2" fill="#1a2a0a"/>
  <!-- Tower body -->
  <rect x="9" y="12" width="14" height="20" rx="1" fill="#2a2a1a"/>
  <rect x="9" y="12" width="14" height="3" fill="#3a3a2a"/>
  <!-- Battlements with skull tops -->
  <rect x="8" y="7" width="4" height="6" rx="0.5" fill="#222210"/>
  <rect x="14" y="7" width="4" height="6" rx="0.5" fill="#222210"/>
  <rect x="20" y="7" width="4" height="6" rx="0.5" fill="#222210"/>
  <rect x="8" y="11" width="16" height="2" fill="#2a2a1a"/>
  <!-- Skull atop each merlon -->
  <ellipse cx="10" cy="7" rx="2" ry="1.8" fill="#ccc8aa"/>
  <circle cx="9.3" cy="6.5" r="0.5" fill="#1a1a0a"/>
  <circle cx="10.7" cy="6.5" r="0.5" fill="#1a1a0a"/>
  <ellipse cx="16" cy="7" rx="2" ry="1.8" fill="#ccc8aa"/>
  <circle cx="15.3" cy="6.5" r="0.5" fill="#1a1a0a"/>
  <circle cx="16.7" cy="6.5" r="0.5" fill="#1a1a0a"/>
  <ellipse cx="22" cy="7" rx="2" ry="1.8" fill="#ccc8aa"/>
  <circle cx="21.3" cy="6.5" r="0.5" fill="#1a1a0a"/>
  <circle cx="22.7" cy="6.5" r="0.5" fill="#1a1a0a"/>
  <!-- Green glowing windows -->
  <rect x="12" y="16" width="8" height="6" rx="1" fill="#0a1a0a"/>
  <ellipse cx="16" cy="19" rx="3" ry="3" fill="#33aa22" opacity="0.6"/>
  <ellipse cx="16" cy="19" rx="1.5" ry="1.5" fill="#66ff33" opacity="0.4"/>
  <!-- Skull on door -->
  <rect x="13" y="27" width="6" height="5" rx="1" fill="#111100"/>
  <ellipse cx="16" cy="28" rx="2" ry="1.8" fill="#bbb8a0"/>
  <circle cx="15.2" cy="27.5" r="0.5" fill="#0a0a00"/>
  <circle cx="16.8" cy="27.5" r="0.5" fill="#0a0a00"/>
  <!-- Bone decorations on walls -->
  <line x1="9" y1="22" x2="12" y2="22" stroke="#bbb8a0" stroke-width="1.2"/>
  <circle cx="9" cy="22" r="0.8" fill="#bbb8a0"/>
  <circle cx="12" cy="22" r="0.8" fill="#bbb8a0"/>
  <line x1="20" y1="22" x2="23" y2="22" stroke="#bbb8a0" stroke-width="1.2"/>
  <circle cx="20" cy="22" r="0.8" fill="#bbb8a0"/>
  <circle cx="23" cy="22" r="0.8" fill="#bbb8a0"/>
  <!-- Death magic wisps -->
  <circle cx="5" cy="18" r="1" fill="#33ff22" opacity="0.5"/>
  <circle cx="27" cy="15" r="1" fill="#22cc11" opacity="0.5"/>
</svg>
