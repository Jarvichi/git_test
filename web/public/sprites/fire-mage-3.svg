<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Pointed hat -->
  <polygon points="16,0 10,10 22,10" fill="#aa1100"/>
  <rect x="8" y="9" width="16" height="3" rx="0.5" fill="#cc2200"/>
  <!-- Head -->
  <ellipse cx="16" cy="14" rx="5" ry="5" fill="#f4c07a"/>
  <!-- Eyes -->
  <circle cx="14" cy="13.5" r="1.2" fill="#ff6600"/>
  <circle cx="18" cy="13.5" r="1.2" fill="#ff6600"/>
  <!-- Beard -->
  <path d="M12,17 Q16,20 20,17 Q18,22 16,22 Q14,22 12,17 Z" fill="#cc8833"/>
  <!-- Robes -->
  <path d="M10,17 L8,30 L24,30 L22,17 Z" fill="#cc1100"/>
  <!-- Belt -->
  <rect x="10" y="20" width="12" height="2" fill="#882200"/>
  <!-- Arms opposite to frame 1 -->
  <line x1="10" y1="19" x2="4" y2="14" stroke="#cc1100" stroke-width="3"/>
  <line x1="22" y1="19" x2="28" y2="15" stroke="#cc1100" stroke-width="3"/>
  <!-- Fireball (larger, fully charged) -->
  <circle cx="29" cy="13" r="4" fill="#ff6600" opacity="0.9"/>
  <circle cx="30" cy="12" r="2.5" fill="#ffcc00" opacity="0.9"/>
  <path d="M27,10 Q30,7 32,9 Q31,7 33,8" stroke="#ff4400" stroke-width="1" fill="none"/>
</svg>
