<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Tower base -->
  <rect x="6" y="16" width="20" height="16" rx="1" fill="#888877"/>
  <rect x="6" y="16" width="20" height="3" fill="#999988"/>
  <!-- Battlements -->
  <rect x="5" y="11" width="4" height="6" rx="0.5" fill="#777766"/>
  <rect x="12" y="11" width="4" height="6" rx="0.5" fill="#777766"/>
  <rect x="19" y="11" width="4" height="6" rx="0.5" fill="#777766"/>
  <rect x="5" y="15" width="22" height="2" fill="#888877"/>
  <!-- Ballista mounted on tower top -->
  <!-- Ballista frame -->
  <rect x="10" y="13" width="12" height="3" rx="1" fill="#7a5a2a"/>
  <!-- Ballista bow arms -->
  <path d="M10,14.5 Q8,11 10,8" stroke="#5a3a1a" stroke-width="2" fill="none"/>
  <path d="M22,14.5 Q24,11 22,8" stroke="#5a3a1a" stroke-width="2" fill="none"/>
  <!-- Bowstring -->
  <line x1="10" y1="8" x2="22" y2="8" stroke="#ccaa66" stroke-width="1"/>
  <!-- Loaded bolt -->
  <rect x="14" y="8" width="8" height="1.5" rx="0.5" fill="#6a4a1a"/>
  <polygon points="22,8.75 25,8 22,9.5" fill="#888888"/>
  <!-- Crank handle -->
  <circle cx="16" cy="16" r="1" fill="#5a3a1a"/>
  <line x1="16" y1="14" x2="16" y2="17" stroke="#5a3a1a" stroke-width="1"/>
  <!-- Ammunition bolts stacked against wall -->
  <rect x="7" y="20" width="5" height="1.5" rx="0.5" fill="#7a5a2a"/>
  <rect x="7" y="22" width="5" height="1.5" rx="0.5" fill="#7a5a2a"/>
  <rect x="7" y="24" width="5" height="1.5" rx="0.5" fill="#7a5a2a"/>
  <polygon points="12,20.75 14,20.25 14,21.25" fill="#888888"/>
  <polygon points="12,22.75 14,22.25 14,23.25" fill="#888888"/>
  <polygon points="12,24.75 14,24.25 14,25.25" fill="#888888"/>
  <!-- Door -->
  <rect x="13" y="26" width="6" height="6" rx="1" fill="#5a3a1a"/>
</svg>
