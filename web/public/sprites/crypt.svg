<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Base -->
  <rect x="3" y="22" width="26" height="10" rx="1" fill="#444"/>
  <!-- Steps -->
  <rect x="5" y="20" width="22" height="3" rx="0.5" fill="#555"/>
  <rect x="7" y="18" width="18" height="3" rx="0.5" fill="#555"/>
  <!-- Main building -->
  <rect x="7" y="8" width="18" height="12" rx="1" fill="#555"/>
  <!-- Roof / gable -->
  <polygon points="4,9 16,2 28,9" fill="#444"/>
  <!-- Door (arched) -->
  <rect x="13" y="14" width="6" height="8" rx="3" fill="#111"/>
  <!-- Cross on building -->
  <rect x="15" y="9" width="2" height="7" fill="#888"/>
  <rect x="12.5" y="11" width="7" height="2" fill="#888"/>
  <!-- Gargoyle hints -->
  <circle cx="7" cy="9" r="1.5" fill="#333"/>
  <circle cx="25" cy="9" r="1.5" fill="#333"/>
  <!-- Spooky atmosphere -->
  <circle cx="10" cy="5" r="1" fill="#00ff88" opacity="0.5"/>
  <circle cx="22" cy="4" r="0.8" fill="#00ff88" opacity="0.4"/>
</svg>
