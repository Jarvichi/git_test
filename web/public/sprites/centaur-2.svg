<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Horse body (raised 1px) -->
  <ellipse cx="14" cy="21" rx="11" ry="6" fill="#884422"/>
  <!-- Horse neck -->
  <path d="M20,16 Q22,12 24,11 Q26,11 26,14" fill="#884422"/>
  <!-- Horse head -->
  <ellipse cx="26" cy="14" rx="5" ry="4" fill="#994433"/>
  <!-- Horse ear -->
  <polygon points="24,11 23,7 26,10" fill="#884422"/>
  <!-- Horse nostril -->
  <ellipse cx="30" cy="15" rx="0.8" ry="0.5" fill="#662211"/>
  <!-- Horse eye -->
  <circle cx="27" cy="12.5" r="1" fill="#111"/>
  <!-- Horse mane -->
  <path d="M20,16 Q21,11 24,9 Q22,12 23,15" fill="#cc7744"/>
  <!-- Human torso -->
  <rect x="12" y="10" width="9" height="8" rx="2" fill="#f4c07a"/>
  <!-- Chest armour -->
  <rect x="13" y="10" width="7" height="6" rx="1" fill="#cc8833"/>
  <!-- Human head -->
  <ellipse cx="16" cy="7" rx="4.5" ry="4" fill="#f4c07a"/>
  <!-- Hair -->
  <path d="M12,6 Q16,1 20,6" fill="#882211"/>
  <!-- Eyes -->
  <circle cx="14.5" cy="7" r="0.8" fill="#333"/>
  <circle cx="17.5" cy="7" r="0.8" fill="#333"/>
  <!-- Spear -->
  <line x1="21" y1="6" x2="32" y2="3" stroke="#8B4513" stroke-width="1.5"/>
  <polygon points="32,2 31,4 30,2.5" fill="#aaaaaa"/>
  <!-- Left arm -->
  <line x1="12" y1="13" x2="6" y2="11" stroke="#f4c07a" stroke-width="2"/>
  <!-- Horse legs mid-stride spread -->
  <rect x="18" y="25" width="3" height="6" rx="1" fill="#662211"/>
  <rect x="13" y="25" width="3" height="7" rx="1" fill="#662211"/>
  <rect x="8" y="25" width="3" height="6" rx="1" fill="#662211"/>
  <rect x="4" y="25" width="3" height="7" rx="1" fill="#662211"/>
</svg>
