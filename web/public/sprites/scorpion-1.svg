<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Tail curving up and over -->
  <path d="M8,20 Q4,16 5,10 Q6,6 10,5 Q13,5 13,8" stroke="#997733" stroke-width="2.5" fill="none"/>
  <!-- Stinger -->
  <polygon points="13,7 11,3 15,5" fill="#ff4444"/>
  <!-- Body segments -->
  <ellipse cx="17" cy="22" rx="7" ry="5" fill="#cc9944"/>
  <ellipse cx="13" cy="20" rx="4" ry="3.5" fill="#bb8833"/>
  <ellipse cx="10" cy="19" rx="3" ry="3" fill="#aa7722"/>
  <!-- Head -->
  <ellipse cx="24" cy="20" rx="6" ry="5" fill="#cc9944"/>
  <!-- Eyes -->
  <circle cx="25" cy="18" r="1.2" fill="#111"/>
  <circle cx="27.5" cy="19" r="1" fill="#111"/>
  <!-- Pincers/claws — open (frame 1) -->
  <path d="M29,18 L32,14 L31,16 L32,17" stroke="#aa7722" stroke-width="2" fill="none"/>
  <path d="M29,20 L32,24 L31,22 L32,21" stroke="#aa7722" stroke-width="2" fill="none"/>
  <!-- Legs (4 pairs) -->
  <line x1="20" y1="25" x2="22" y2="30" stroke="#aa7722" stroke-width="1.5"/>
  <line x1="17" y1="26" x2="18" y2="31" stroke="#aa7722" stroke-width="1.5"/>
  <line x1="14" y1="25" x2="13" y2="30" stroke="#aa7722" stroke-width="1.5"/>
  <line x1="11" y1="24" x2="9" y2="29" stroke="#aa7722" stroke-width="1.5"/>
  <line x1="20" y1="24" x2="23" y2="27" stroke="#aa7722" stroke-width="1"/>
  <line x1="17" y1="24" x2="19" y2="27" stroke="#aa7722" stroke-width="1"/>
  <line x1="14" y1="23" x2="12" y2="26" stroke="#aa7722" stroke-width="1"/>
  <line x1="11" y1="22" x2="8" y2="25" stroke="#aa7722" stroke-width="1"/>
</svg>
