<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Left wing -->
  <path d="M14,14 L1,3 L5,14 L1,18 L10,16 Z" fill="#aa2211"/>
  <!-- Right wing -->
  <path d="M18,14 L31,3 L27,14 L31,18 L22,16 Z" fill="#aa2211"/>
  <!-- Wing membrane texture -->
  <line x1="14" y1="14" x2="3" y2="6" stroke="#cc3322" stroke-width="0.8"/>
  <line x1="14" y1="14" x2="4" y2="12" stroke="#cc3322" stroke-width="0.8"/>
  <line x1="18" y1="14" x2="29" y2="6" stroke="#cc3322" stroke-width="0.8"/>
  <line x1="18" y1="14" x2="28" y2="12" stroke="#cc3322" stroke-width="0.8"/>
  <!-- Body -->
  <ellipse cx="16" cy="19" rx="7" ry="5.5" fill="#dd4433"/>
  <!-- Belly scales (lighter) -->
  <ellipse cx="16" cy="20" rx="4" ry="3.5" fill="#ee7755"/>
  <!-- Neck -->
  <path d="M13,15 Q14,10 18,9 Q21,10 22,15" fill="#dd4433"/>
  <!-- Head -->
  <ellipse cx="20" cy="10" rx="6" ry="5" fill="#dd4433"/>
  <!-- Snout -->
  <path d="M24,9 L29,11 L27,14 L23,12 Z" fill="#cc3322"/>
  <!-- Nostril -->
  <ellipse cx="27" cy="11.5" rx="1" ry="0.6" fill="#aa1100"/>
  <!-- Eye -->
  <circle cx="21" cy="8.5" r="2" fill="#ffdd00"/>
  <ellipse cx="21" cy="8.5" rx="0.8" ry="1.4" fill="#111"/>
  <!-- Fire breath -->
  <path d="M29,12 Q34,9 33,14 Q36,11 34,17 Q31,14 29,16 Z" fill="#ff8800"/>
  <path d="M29,13 Q32,11 31,15" fill="#ffcc00"/>
  <!-- Horns -->
  <polygon points="17,6 15,2 18,5" fill="#cc3322"/>
  <polygon points="22,5 23,1 24,5" fill="#cc3322"/>
  <!-- Tail -->
  <path d="M9,22 Q4,27 6,31 Q9,28 11,31 Q11,27 13,24" fill="#cc3322"/>
  <!-- Tail spike -->
  <polygon points="6,31 4,33 8,32" fill="#aa2211"/>
  <!-- Claws -->
  <path d="M13,23 L11,27 L12,28 L14,25 L15,28 L16,24" fill="#cc3322"/>
  <path d="M19,23 L17,27 L18,28 L20,25 L21,28 L22,24" fill="#cc3322"/>
</svg>
