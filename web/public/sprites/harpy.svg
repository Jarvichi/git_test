  <path d="M12,9 Q16,3 20,9" fill="#118833"/>
  <!-- Eyes -->
  <circle cx="14.5" cy="10" r="0.9" fill="#333"/>
  <circle cx="17.5" cy="10" r="0.9" fill="#333"/>
  <!-- Beak -->
  <path d="M15,12 L16,13.5 L17,12" fill="#cc8822"/>
  <!-- Talons -->
  <line x1="13" y1="21" x2="11" y2="26" stroke="#667733" stroke-width="2"/>
  <line x1="19" y1="21" x2="21" y2="26" stroke="#667733" stroke-width="2"/>
  <line x1="11" y1="26" x2="9" y2="29" stroke="#667733" stroke-width="1.5"/>
  <line x1="11" y1="26" x2="12" y2="29" stroke="#667733" stroke-width="1.5"/>
  <line x1="21" y1="26" x2="19" y2="29" stroke="#667733" stroke-width="1.5"/>
  <line x1="21" y1="26" x2="22" y2="29" stroke="#667733" stroke-width="1.5"/>
</svg>
