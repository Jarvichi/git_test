<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Hood -->
  <path d="M10,9 Q16,2 22,9" fill="#2a6688"/>
  <!-- Head -->
  <ellipse cx="16" cy="10" rx="5.5" ry="5" fill="#f4c07a"/>
  <!-- Eyes -->
  <circle cx="14" cy="9.5" r="0.9" fill="#333"/>
  <circle cx="18" cy="9.5" r="0.9" fill="#333"/>
  <!-- Body (tunic) -->
  <path d="M11,15 L10,30 L22,30 L21,15 Q16,18 11,15 Z" fill="#2a6688"/>
  <!-- Belt -->
  <rect x="11" y="20" width="10" height="2" fill="#8B4513"/>
  <!-- Quiver on back -->
  <rect x="21" y="13" width="4" height="10" rx="2" fill="#8B4513"/>
  <line x1="22" y1="12" x2="22" y2="14" stroke="#ffcc00" stroke-width="1"/>
  <line x1="24" y1="12" x2="24" y2="14" stroke="#ffcc00" stroke-width="1"/>
  <!-- Bow (left arm extended) -->
  <path d="M5,8 Q1,16 5,24" stroke="#8B4513" stroke-width="2" fill="none"/>
  <line x1="5" y1="8" x2="5" y2="24" stroke="#e0d0b0" stroke-width="0.8"/>
  <!-- Arrow -->
  <line x1="5" y1="16" x2="13" y2="16" stroke="#8B4513" stroke-width="1.5"/>
  <polygon points="13,16 11,14.5 11,17.5" fill="#ccbbaa"/>
  <line x1="5" y1="16" x2="6" y2="15" stroke="#ffcc00" stroke-width="0.8"/>
  <line x1="5" y1="16" x2="6" y2="17" stroke="#ffcc00" stroke-width="0.8"/>
</svg>
