<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Tail -->
  <path d="M12,23 Q6,27 4,31" stroke="#336633" stroke-width="3" fill="none"/>
  <!-- Body (raised 1px) -->
  <ellipse cx="17" cy="19" rx="7" ry="6" fill="#447744"/>
  <ellipse cx="17" cy="18" rx="5" ry="4" fill="#336633" opacity="0.4"/>
  <!-- Neck -->
  <rect x="14" y="11" width="6" height="6" rx="2" fill="#447744"/>
  <!-- Head -->
  <ellipse cx="17" cy="9" rx="6" ry="5" fill="#55aa55"/>
  <!-- Snout -->
  <path d="M21,8 L28,10 L26,13 L21,11 Z" fill="#447744"/>
  <!-- Nostril -->
  <circle cx="26" cy="10.5" r="0.8" fill="#224422"/>
  <!-- Eye -->
  <circle cx="22" cy="7" r="2" fill="#ffcc00"/>
  <ellipse cx="22" cy="7" rx="0.8" ry="1.4" fill="#111"/>
  <!-- Spines -->
  <polygon points="14,5 12,1 16,4" fill="#336633"/>
  <polygon points="17,4 16,0 19,3" fill="#336633"/>
  <!-- Arms neutral -->
  <line x1="11" y1="17" x2="5" y2="19" stroke="#336633" stroke-width="3"/>
  <line x1="23" y1="17" x2="29" y2="15" stroke="#336633" stroke-width="3"/>
  <!-- Claws -->
  <line x1="29" y1="15" x2="31" y2="13" stroke="#336633" stroke-width="1.5"/>
  <line x1="29" y1="15" x2="31" y2="17" stroke="#336633" stroke-width="1.5"/>
  <!-- Legs: mid-stride -->
  <rect x="12" y="23" width="4" height="6" rx="1" fill="#336633"/>
  <rect x="18" y="23" width="4" height="6" rx="1" fill="#336633"/>
</svg>
