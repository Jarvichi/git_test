<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Mushroom ring on ground -->
  <ellipse cx="16" cy="24" rx="13" ry="5" fill="#2a3a2a" opacity="0.8"/>
  <!-- Individual mushrooms around the ring -->
  <!-- Top mushroom -->
  <rect x="15" y="8" width="2" height="5" rx="0.5" fill="#d8c8a0"/>
  <ellipse cx="16" cy="8" rx="4" ry="2.5" fill="#cc3333"/>
  <circle cx="14.5" cy="7.5" r="0.6" fill="#fff"/>
  <circle cx="17" cy="7" r="0.5" fill="#fff"/>
  <!-- Left mushroom -->
  <rect x="6" y="14" width="2" height="4" rx="0.5" fill="#d8c8a0"/>
  <ellipse cx="7" cy="14" rx="3" ry="2" fill="#cc3333"/>
  <circle cx="5.5" cy="13.5" r="0.5" fill="#fff"/>
  <!-- Right mushroom -->
  <rect x="24" y="14" width="2" height="4" rx="0.5" fill="#d8c8a0"/>
  <ellipse cx="25" cy="14" rx="3" ry="2" fill="#cc3333"/>
  <circle cx="26" cy="13.5" r="0.5" fill="#fff"/>
  <!-- Bottom-left mushroom -->
  <rect x="9" y="21" width="2" height="3" rx="0.5" fill="#d8c8a0"/>
  <ellipse cx="10" cy="21" rx="3" ry="1.8" fill="#cc6633"/>
  <!-- Bottom-right mushroom -->
  <rect x="21" y="21" width="2" height="3" rx="0.5" fill="#d8c8a0"/>
  <ellipse cx="22" cy="21" rx="3" ry="1.8" fill="#cc6633"/>
  <!-- Magical sparkles in center -->
  <circle cx="16" cy="17" r="2" fill="#aaffee" opacity="0.6"/>
  <circle cx="13" cy="18" r="1" fill="#aaffee" opacity="0.4"/>
  <circle cx="19" cy="16" r="1" fill="#ffaaee" opacity="0.4"/>
  <circle cx="16" cy="14" r="0.8" fill="#ffeeaa" opacity="0.5"/>
  <!-- Tiny pixie silhouette -->
  <circle cx="16" cy="16" r="1.5" fill="#ffccaa"/>
  <ellipse cx="14" cy="16" rx="2" ry="1" fill="#aaffee" opacity="0.8" transform="rotate(-20 14 16)"/>
  <ellipse cx="18" cy="16" rx="2" ry="1" fill="#aaffee" opacity="0.8" transform="rotate(20 18 16)"/>
</svg>
