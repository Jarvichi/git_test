<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Left cape-wing lowered -->
  <path d="M12,16 L1,21 L3,14 L1,11 L9,15 Z" fill="#1a0022"/>
  <!-- Right cape-wing lowered -->
  <path d="M20,16 L31,21 L29,14 L31,11 L23,15 Z" fill="#1a0022"/>
  <!-- Cape body -->
  <path d="M11,16 L9,30 L16,24 L23,30 L21,16 Z" fill="#220033"/>
  <!-- Body -->
  <rect x="12" y="16" width="8" height="8" rx="1" fill="#ddeeff"/>
  <!-- Cravat -->
  <polygon points="16,16 14,19 16,22 18,19" fill="#cc2222"/>
  <!-- Head -->
  <ellipse cx="16" cy="11" rx="5.5" ry="5" fill="#e8ddd0"/>
  <!-- Widow's peak -->
  <path d="M11,9 Q16,3 21,9 Q18,7 16,8 Q14,7 11,9 Z" fill="#111"/>
  <!-- Eyes -->
  <circle cx="14" cy="10.5" r="1.3" fill="#cc0000"/>
  <circle cx="18" cy="10.5" r="1.3" fill="#cc0000"/>
  <circle cx="14.2" cy="10.3" r="0.5" fill="#ff6666"/>
  <circle cx="18.2" cy="10.3" r="0.5" fill="#ff6666"/>
  <!-- Fangs -->
  <polygon points="14.5,14 15.2,17 15.9,14" fill="white"/>
  <polygon points="16.1,14 16.8,17 17.5,14" fill="white"/>
</svg>
