<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Ground platform -->
  <rect x="2" y="26" width="28" height="4" rx="1" fill="#5a3a1a"/>
  <rect x="2" y="24" width="28" height="3" rx="1" fill="#6a4a2a"/>
  <!-- Steps up to platform -->
  <rect x="4" y="27" width="6" height="1.5" rx="0.3" fill="#7a5a3a"/>
  <rect x="5" y="28.5" width="5" height="1.5" rx="0.3" fill="#6a4a2a"/>
  <!-- Gallows vertical post -->
  <rect x="8" y="4" width="4" height="24" rx="1" fill="#4a2a0a"/>
  <!-- Gallows horizontal beam -->
  <rect x="8" y="4" width="18" height="4" rx="1" fill="#5a3a1a"/>
  <!-- Support brace -->
  <line x1="12" y1="4" x2="22" y2="12" stroke="#4a2a0a" stroke-width="2.5"/>
  <!-- Rope -->
  <line x1="22" y1="8" x2="22" y2="18" stroke="#aa8844" stroke-width="1.5"/>
  <!-- Noose loop -->
  <ellipse cx="22" cy="19" rx="2.5" ry="2" fill="none" stroke="#aa8844" stroke-width="1.5"/>
  <!-- Skull on ground (grim decoration) -->
  <ellipse cx="20" cy="25.5" rx="2" ry="1.8" fill="#ddd8bb"/>
  <circle cx="19.3" cy="25" r="0.6" fill="#221100"/>
  <circle cx="20.7" cy="25" r="0.6" fill="#221100"/>
  <rect x="19" y="26.5" width="2.5" height="0.8" rx="0.2" fill="#bbb8aa"/>
  <!-- Raven perched on beam -->
  <ellipse cx="24" cy="5.5" rx="2" ry="1.5" fill="#1a1a22"/>
  <ellipse cx="25.5" cy="4.5" rx="1.5" ry="1.3" fill="#1a1a22"/>
  <polygon points="26.5,4.5 28,4 27,5.5" fill="#111122"/>
  <circle cx="26" cy="4" r="0.5" fill="#cc2200"/>
  <!-- Axe leaning against post -->
  <rect x="4" y="18" width="2" height="8" rx="0.5" fill="#6a4a2a"/>
  <path d="M4,18 L1,15 L2,21 L4,21 Z" fill="#888888"/>
  <path d="M6,18 L9,15 L8,21 L6,21 Z" fill="#777777"/>
</svg>
