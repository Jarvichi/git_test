<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Sky background (implicit dark) -->
  <!-- Barn / farmhouse body -->
  <rect x="7" y="16" width="18" height="14" fill="#c8864a"/>
  <!-- Roof -->
  <polygon points="4,16 16,5 28,16" fill="#7a3a1a"/>
  <!-- Roof ridge -->
  <line x1="16" y1="5" x2="16" y2="16" stroke="#5a2a0a" stroke-width="1"/>
  <!-- Door (barn style, two halves) -->
  <rect x="13" y="22" width="6" height="8" fill="#5a3011"/>
  <line x1="16" y1="22" x2="16" y2="30" stroke="#3a1a00" stroke-width="0.8"/>
  <line x1="13" y1="26" x2="19" y2="26" stroke="#3a1a00" stroke-width="0.8"/>
  <!-- Window -->
  <rect x="8" y="17" width="6" height="5" rx="0.5" fill="#88ccff" opacity="0.9"/>
  <line x1="8" y1="19.5" x2="14" y2="19.5" stroke="#4488aa" stroke-width="0.6"/>
  <line x1="11" y1="17" x2="11" y2="22" stroke="#4488aa" stroke-width="0.6"/>
  <!-- Crops (left field) -->
  <line x1="1" y1="30" x2="1" y2="24" stroke="#55aa22" stroke-width="1.5"/>
  <line x1="3" y1="30" x2="3" y2="23" stroke="#55aa22" stroke-width="1.5"/>
  <line x1="5" y1="30" x2="5" y2="25" stroke="#55aa22" stroke-width="1.5"/>
  <ellipse cx="1" cy="23" rx="1.5" ry="1" fill="#66cc33"/>
  <ellipse cx="3" cy="22" rx="1.5" ry="1" fill="#66cc33"/>
  <ellipse cx="5" cy="24" rx="1.5" ry="1" fill="#66cc33"/>
  <!-- Crops (right field) -->
  <line x1="27" y1="30" x2="27" y2="24" stroke="#55aa22" stroke-width="1.5"/>
  <line x1="29" y1="30" x2="29" y2="23" stroke="#55aa22" stroke-width="1.5"/>
  <line x1="31" y1="30" x2="31" y2="25" stroke="#55aa22" stroke-width="1.5"/>
  <ellipse cx="27" cy="23" rx="1.5" ry="1" fill="#66cc33"/>
  <ellipse cx="29" cy="22" rx="1.5" ry="1" fill="#66cc33"/>
  <ellipse cx="31" cy="24" rx="1.5" ry="1" fill="#66cc33"/>
  <!-- Gold coin (mana symbol on barn) -->
  <circle cx="22" cy="19.5" r="2.5" fill="#ffcc00"/>
  <text x="20.5" y="21" font-size="4" fill="#aa7700" font-weight="bold">M</text>
  <!-- Ground line -->
  <line x1="0" y1="30" x2="32" y2="30" stroke="#553311" stroke-width="0.8"/>
</svg>
