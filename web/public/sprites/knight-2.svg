<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Helmet (raised 1px mid-stride) -->
  <rect x="10" y="1" width="12" height="12" rx="3" fill="#9999bb"/>
  <!-- Visor slit -->
  <rect x="11" y="7" width="10" height="2" rx="0.5" fill="#1a1a2a"/>
  <rect x="11" y="10" width="10" height="1.5" rx="0.5" fill="#1a1a2a"/>
  <!-- Helmet crest -->
  <rect x="14" y="0" width="4" height="4" rx="1" fill="#cc2222"/>
  <!-- Gorget / neck plate -->
  <rect x="12" y="12" width="8" height="3" rx="1" fill="#8888aa"/>
  <!-- Chest plate -->
  <rect x="8" y="14" width="16" height="11" rx="2" fill="#8888aa"/>
  <!-- Breastplate line -->
  <line x1="16" y1="14" x2="16" y2="25" stroke="#6666aa" stroke-width="1"/>
  <!-- Shield (left) -->
  <path d="M3,13 L3,24 Q3,27 6,27 L9,27 L9,13 Z" fill="#4444aa"/>
  <path d="M3,15 Q6,21 3,26" stroke="#8888cc" stroke-width="1" fill="none"/>
  <line x1="4" y1="20" x2="8" y2="20" stroke="#8888cc" stroke-width="0.8"/>
  <!-- Sword (right, raised) -->
  <rect x="23" y="3" width="2.5" height="20" rx="1" fill="#ddddee"/>
  <rect x="20" y="9" width="9" height="2.5" rx="1" fill="#aaaacc"/>
  <ellipse cx="24" cy="22" rx="2" ry="1.5" fill="#cc9922"/>
  <!-- Legs: both mid-stride equal -->
  <rect x="10" y="24" width="5" height="5" rx="1" fill="#7777aa"/>
  <rect x="17" y="24" width="5" height="5" rx="1" fill="#7777aa"/>
  <!-- Sabatons: both equal -->
  <rect x="9" y="27" width="7" height="2.5" rx="1" fill="#6666aa"/>
  <rect x="16" y="27" width="7" height="2.5" rx="1" fill="#6666aa"/>
</svg>
