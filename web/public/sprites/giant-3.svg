<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Club (raised high, right arm) -->
  <rect x="26" y="1" width="5" height="14" rx="2" fill="#6a4a2a"/>
  <ellipse cx="28.5" cy="2" rx="3.5" ry="2.5" fill="#5a3a1a"/>
  <!-- Head (large) -->
  <ellipse cx="13" cy="7" rx="8" ry="7" fill="#887766"/>
  <!-- Brow ridge -->
  <ellipse cx="13" cy="6" rx="7" ry="3" fill="#776655" opacity="0.5"/>
  <!-- Eyes (deep set, red-tinged) -->
  <circle cx="10" cy="6.5" r="1.8" fill="#221100"/>
  <circle cx="16" cy="6.5" r="1.8" fill="#221100"/>
  <circle cx="10.3" cy="6.2" r="0.8" fill="#cc3300"/>
  <circle cx="16.3" cy="6.2" r="0.8" fill="#cc3300"/>
  <!-- Flat nose -->
  <ellipse cx="13" cy="9.5" rx="2.5" ry="1.5" fill="#776655"/>
  <!-- Mouth (gap-toothed grin) -->
  <path d="M9,12 Q13,15 17,12" fill="#221100"/>
  <rect x="11" y="12" width="1.5" height="2" fill="#e8e8cc"/>
  <rect x="14" y="12" width="1.5" height="2" fill="#e8e8cc"/>
  <!-- Huge torso -->
  <ellipse cx="13" cy="22" rx="11" ry="9" fill="#998877"/>
  <!-- Ragged vest -->
  <path d="M6,16 L4,31 L22,31 L20,16 Z" fill="#554433" opacity="0.6"/>
  <!-- Left arm swinging back -->
  <ellipse cx="2" cy="21" rx="3" ry="7" fill="#887766"/>
  <!-- Right arm raised with club -->
  <rect x="21" y="12" width="6" height="10" rx="2" fill="#887766"/>
  <!-- Legs: left forward, right back -->
  <rect x="7" y="29" width="6" height="3" rx="1" fill="#665544"/>
  <rect x="14" y="29" width="6" height="3" rx="1" fill="#665544"/>
</svg>
