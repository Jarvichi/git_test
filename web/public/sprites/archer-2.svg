<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Hood -->
  <path d="M10,9 Q16,2 22,9" fill="#2a6688"/>
  <!-- Head (raised 1px - mid-stride body up) -->
  <ellipse cx="16" cy="9" rx="5.5" ry="5" fill="#f4c07a"/>
  <!-- Eyes -->
  <circle cx="14" cy="8.5" r="0.9" fill="#333"/>
  <circle cx="18" cy="8.5" r="0.9" fill="#333"/>
  <!-- Body (tunic torso, raised 1px) -->
  <path d="M11,14 L11,21 L21,21 L21,14 Q16,17 11,14 Z" fill="#2a6688"/>
  <!-- Belt -->
  <rect x="11" y="19" width="10" height="2" fill="#8B4513"/>
  <!-- Quiver on back -->
  <rect x="21" y="12" width="4" height="10" rx="2" fill="#8B4513"/>
  <line x1="22" y1="11" x2="22" y2="13" stroke="#ffcc00" stroke-width="1"/>
  <line x1="24" y1="11" x2="24" y2="13" stroke="#ffcc00" stroke-width="1"/>
  <!-- Bow -->
  <path d="M5,7 Q1,15 5,23" stroke="#8B4513" stroke-width="2" fill="none"/>
  <line x1="5" y1="7" x2="5" y2="23" stroke="#e0d0b0" stroke-width="0.8"/>
  <!-- Arrow -->
  <line x1="5" y1="15" x2="13" y2="15" stroke="#8B4513" stroke-width="1.5"/>
  <polygon points="13,15 11,13.5 11,16.5" fill="#ccbbaa"/>
  <line x1="5" y1="15" x2="6" y2="14" stroke="#ffcc00" stroke-width="0.8"/>
  <line x1="5" y1="15" x2="6" y2="16" stroke="#ffcc00" stroke-width="0.8"/>
  <!-- Legs: both mid-stride symmetric -->
  <rect x="11" y="21" width="5" height="6" rx="1" fill="#1a4d66"/>
  <rect x="17" y="21" width="5" height="6" rx="1" fill="#1a4d66"/>
  <!-- Boots -->
  <rect x="10" y="25" width="7" height="3" rx="1" fill="#553311"/>
  <rect x="17" y="25" width="7" height="3" rx="1" fill="#553311"/>
</svg>
