<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Large round head -->
  <ellipse cx="16" cy="8" rx="9" ry="8" fill="#5a7a3a"/>
  <!-- Brow ridge -->
  <ellipse cx="16" cy="5" rx="8" ry="3" fill="#4a6a2a"/>
  <!-- Eyes -->
  <ellipse cx="12" cy="7" rx="2.5" ry="2" fill="#ffdd00"/>
  <ellipse cx="20" cy="7" rx="2.5" ry="2" fill="#ffdd00"/>
  <circle cx="12.5" cy="7" r="1" fill="#111"/>
  <circle cx="20.5" cy="7" r="1" fill="#111"/>
  <!-- Nose -->
  <ellipse cx="16" cy="11" rx="2.5" ry="1.5" fill="#4a6a2a"/>
  <circle cx="14.5" cy="11" r="1" fill="#3a5a1a"/>
  <circle cx="17.5" cy="11" r="1" fill="#3a5a1a"/>
  <!-- Mouth / tusks -->
  <path d="M11,13 Q16,16 21,13" stroke="#3a5a1a" stroke-width="1.5" fill="none"/>
  <rect x="13" y="14" width="2" height="3" rx="0.5" fill="#ddd"/>
  <rect x="17" y="14" width="2" height="3" rx="0.5" fill="#ddd"/>
  <!-- Massive body -->
  <ellipse cx="16" cy="22" rx="10" ry="8" fill="#5a7a3a"/>
  <!-- Arms (thick) -->
  <ellipse cx="5" cy="21" rx="4" ry="3" fill="#5a7a3a"/>
  <ellipse cx="27" cy="21" rx="4" ry="3" fill="#5a7a3a"/>
  <!-- Hands (fists) -->
  <circle cx="3" cy="24" r="3" fill="#4a6a2a"/>
  <circle cx="29" cy="24" r="3" fill="#4a6a2a"/>
  <!-- Legs -->
  <ellipse cx="12" cy="30" rx="4" ry="3" fill="#4a6a2a"/>
  <ellipse cx="20" cy="30" rx="4" ry="3" fill="#4a6a2a"/>
</svg>
