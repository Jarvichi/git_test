<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Massive armoured body (raised 1px) -->
  <ellipse cx="16" cy="19" rx="14" ry="11" fill="#333344"/>
  <ellipse cx="16" cy="18" rx="11" ry="8" fill="#444455" opacity="0.7"/>
  <line x1="5" y1="19" x2="27" y2="19" stroke="#222233" stroke-width="0.8"/>
  <line x1="7" y1="24" x2="25" y2="24" stroke="#222233" stroke-width="0.8"/>
  <line x1="6" y1="15" x2="26" y2="15" stroke="#222233" stroke-width="0.8"/>
  <!-- Head -->
  <ellipse cx="20" cy="7" rx="10" ry="8" fill="#444455"/>
  <ellipse cx="20" cy="5" rx="9" ry="4" fill="#333344"/>
  <!-- Eyes -->
  <circle cx="16.5" cy="6" r="2.5" fill="#440000"/>
  <circle cx="23.5" cy="6" r="2.5" fill="#440000"/>
  <circle cx="16.5" cy="6" r="1.3" fill="#ff2200"/>
  <circle cx="23.5" cy="6" r="1.3" fill="#ff2200"/>
  <!-- Jaw -->
  <path d="M12,12 L13,16 L27,16 L28,12" fill="#222233"/>
  <!-- Fangs -->
  <polygon points="15,13 14,17 17,13" fill="#888877"/>
  <polygon points="21,13 24,13 23,17" fill="#888877"/>
  <!-- Arms: both out (mid-stride) -->
  <ellipse cx="2" cy="18" rx="3" ry="8" fill="#333344"/>
  <ellipse cx="30" cy="13" rx="3" ry="7" fill="#333344"/>
  <!-- Shoulder spikes -->
  <polygon points="5,9 3,4 7,8" fill="#555566"/>
  <polygon points="27,9 29,4 25,8" fill="#555566"/>
  <!-- Legs mid-stride -->
  <rect x="7" y="28" width="7" height="4" rx="1" fill="#222233"/>
  <rect x="18" y="28" width="7" height="4" rx="1" fill="#222233"/>
</svg>
